<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>🎬 영화/드라마 DB v27</title>
<!-- PWA 설정 -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="영화DB">
<meta name="theme-color" content="#090f1e">
<link rel="manifest" href="manifest.json">
<!-- Open Graph (GitHub Pages 공유용) -->
<meta property="og:type" content="website">
<meta property="og:title" content="🎬 나의 영화/드라마 DB">
<meta property="og:description" content="개인 영화 관람 기록 · 감정별 추천 · 인문학 노트">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',system-ui,sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh;padding-bottom:calc(5rem + env(safe-area-inset-bottom));padding-top:env(safe-area-inset-top);overflow-x:hidden;width:100%;max-width:100vw}

/* ── safe-area 적용 (노치/홈바 겹침 방지) ── */
.sticky-header{position:sticky;top:0;top:env(safe-area-inset-top);z-index:200;background:#0d1117}
.progress-panel{padding-bottom:calc(.48rem + env(safe-area-inset-bottom))}
.scroll-top-btn{bottom:calc(3.5rem + env(safe-area-inset-bottom))}

/* ── 상단 고정 헤더 ── */
.sticky-header{position:sticky;top:0;z-index:200;background:#0d1117}
.main-nav{background:linear-gradient(135deg,#090f1e,#0e1f3a);border-bottom:1px solid rgba(255,255,255,.06);padding:.6rem 1.2rem}
.nav-inner{max-width:1440px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:.5rem}
.logo h1{font-size:1rem;font-weight:700;color:#eef2ff;white-space:nowrap}
.stats-badge{background:rgba(100,160,240,.15);border:1px solid rgba(100,160,240,.25);color:#93c5fd;padding:.1rem .5rem;border-radius:16px;font-size:.63rem;font-weight:600;margin-left:.35rem;vertical-align:middle}
.nav-links{display:flex;gap:.2rem;flex-wrap:wrap;align-items:center}
.nav-btn{background:transparent;border:1px solid transparent;padding:.26rem .7rem;border-radius:16px;font-weight:600;font-size:.73rem;color:rgba(255,255,255,.48);cursor:pointer;transition:all .13s;font-family:inherit;position:relative}
.nav-btn:hover{color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.12)}
.nav-btn.active{background:#e8a020;color:#111;border-color:#e8a020}
.fav-nav-btn{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);color:#fbbf24;padding:.26rem .7rem;border-radius:16px;font-weight:600;font-size:.73rem;cursor:pointer;transition:all .13s;font-family:inherit}
.fav-nav-btn:hover,.fav-nav-btn.active{background:#fbbf24;color:#111;border-color:#fbbf24}

/* ── 서브카테고리 드롭다운 ── */
.nav-btn-wrap{position:relative;display:inline-flex;align-items:center}
.sub-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:#1a2540;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.35rem;z-index:500;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;flex-direction:column;gap:.18rem}
.sub-dropdown.open{display:flex}
.sub-chip{background:transparent;border:none;color:rgba(255,255,255,.6);padding:.28rem .6rem;border-radius:7px;cursor:pointer;font-size:.72rem;font-family:inherit;text-align:left;transition:background .1s;white-space:nowrap}
.sub-chip:hover{background:rgba(255,255,255,.08);color:#fff}
.sub-chip.active{background:rgba(232,160,32,.18);color:#e8a020}
.dropdown-arrow{font-size:.55rem;margin-left:.18rem;opacity:.5}

/* ── 검색바 ── */
.search-bar{background:#111827;border-bottom:1px solid rgba(255,255,255,.055);padding:.5rem 1.2rem}
.search-bar-inner{max-width:1440px;margin:0 auto;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.search-wrap{display:flex;flex:1;min-width:180px;background:#161e30;border:1px solid rgba(255,255,255,.09);border-radius:20px;overflow:hidden}
.search-wrap input{flex:1;padding:.4rem .85rem;background:transparent;border:none;color:#e2e8f0;font-size:.81rem;font-family:inherit;outline:none}
.search-wrap input::placeholder{color:rgba(255,255,255,.2)}
.search-wrap button{background:#e8a020;border:none;padding:.4rem .85rem;color:#111;font-weight:700;font-size:.74rem;cursor:pointer;transition:background .12s}
.search-wrap button:hover{background:#f0b030}
.sort-select{background:#161e30;border:1px solid rgba(255,255,255,.09);color:#d1deff;padding:.4rem .75rem;border-radius:20px;font-size:.73rem;cursor:pointer;min-width:140px;font-family:inherit}
.sort-select option{background:#161e30}

/* ── 툴바 ── */
.toolbar{max-width:1440px;margin:.5rem auto 0;padding:0 1.2rem;display:flex;flex-wrap:wrap;gap:.38rem;align-items:center}
.tbtn{background:#161e30;border:1px solid rgba(255,255,255,.09);color:#c4d4f0;padding:.4rem .78rem;border-radius:18px;cursor:pointer;font-weight:500;font-size:.73rem;white-space:nowrap;transition:all .13s;font-family:inherit;display:inline-flex;align-items:center;gap:.28rem}
.tbtn:hover{background:#1e2d48;border-color:rgba(255,255,255,.18)}
.tbtn.gold{background:#e8a020;color:#111;border-color:#e8a020;font-weight:700}
.tbtn.gold:hover{background:#f0b030}
.tbtn.green{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.28);color:#6ee7b7}
.tbtn.green:hover{background:rgba(52,211,153,.18)}
.tbtn.slate{background:#1e2a3e}

/* ── 장르 필터 ── */
.filter-bar{max-width:1440px;margin:.4rem auto 0;padding:.35rem 1.2rem;display:flex;flex-wrap:wrap;align-items:center;gap:.28rem}
.filter-label{font-size:.68rem;color:rgba(255,255,255,.3);font-weight:500;margin-right:.08rem}
.filter-chips{display:flex;flex-wrap:wrap;gap:.22rem;align-items:center}
.chip{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.42);padding:.16rem .55rem;border-radius:11px;cursor:pointer;font-size:.67rem;font-weight:500;transition:all .12s}
.chip:hover{background:rgba(255,255,255,.1);color:#fff}
.chip.active{background:#e8a020;border-color:#e8a020;color:#111}
.stats-count{margin-left:auto;font-size:.67rem;color:rgba(255,255,255,.26)}

/* ── 해시태그 필터 바 ── */
.hashtag-bar{max-width:1440px;margin:.3rem auto 0;padding:.3rem 1.2rem;display:flex;flex-wrap:wrap;align-items:center;gap:.22rem}
.hashtag-label{font-size:.65rem;color:rgba(255,255,255,.28);font-weight:500;margin-right:.1rem}
.htag{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.18);color:rgba(167,139,250,.65);padding:.14rem .5rem;border-radius:11px;cursor:pointer;font-size:.64rem;font-weight:500;transition:all .12s}
.htag:hover{background:rgba(139,92,246,.18);color:#c4b5fd}
.htag.active{background:rgba(139,92,246,.3);border-color:#8b5cf6;color:#ddd6fe}

/* ── 카드 그리드 ── */
.grid-container{max-width:1440px;margin:.6rem auto;padding:0 .85rem;display:grid;grid-template-columns:repeat(6,1fr);gap:.82rem}
@media(max-width:1200px){.grid-container{grid-template-columns:repeat(5,1fr)}}
@media(max-width:960px) {.grid-container{grid-template-columns:repeat(4,1fr);gap:.65rem}}
@media(max-width:680px) {.grid-container{grid-template-columns:repeat(3,1fr);gap:.45rem}}
@media(max-width:380px) {.grid-container{grid-template-columns:repeat(3,1fr);gap:.32rem}}
.movie-card{background:#131b2c;border:1px solid rgba(255,255,255,.055);border-radius:11px;overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s,border-color .15s}
.movie-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.45);border-color:rgba(232,160,32,.28)}
.movie-card.fav-card{border-color:rgba(251,191,36,.3)}

.poster{aspect-ratio:2/3;background:#0c1320;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.poster-img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.movie-card:hover .poster-img{transform:scale(1.04)}
.poster-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;background:linear-gradient(160deg,#182038,#0c1320);color:rgba(255,255,255,.16);font-size:.6rem;text-align:center;padding:.3rem}
.ph-icon{font-size:1.5rem;opacity:.28}
.ph-no{font-size:.55rem;color:rgba(255,255,255,.13);margin-top:.08rem}

.card-info{padding:.48rem .52rem .32rem;flex:1}
.card-title{font-weight:700;font-size:.78rem;line-height:1.32;color:#dde8f8;word-break:keep-all;overflow-wrap:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ep-badge{font-size:.6rem;color:#fbbf24;font-weight:600;white-space:nowrap}
.card-meta{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:.25rem;display:flex;flex-wrap:wrap;gap:.2rem .35rem;align-items:center;line-height:1.5}
.card-meta .rating{color:#fbbf24;font-weight:700;font-size:.7rem}
.card-meta .year{color:#94a3b8}
.card-meta .country{color:#94a3b8}
.cat-badge{background:rgba(99,179,237,.14);border:1px solid rgba(99,179,237,.26);color:#7dd3fc;font-size:.59rem;font-weight:700;padding:.02rem .35rem;border-radius:6px}
.cat-badge.drama{background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.26);color:#c4b5fd}
.cat-badge.docu{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.25);color:#6ee7b7}
.card-genre{font-size:.59rem;color:rgba(255,255,255,.22);margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-hashtags{display:flex;flex-wrap:wrap;gap:.18rem;margin-top:.2rem}
.card-htag{font-size:.55rem;color:rgba(167,139,250,.6);background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.14);border-radius:6px;padding:.04rem .3rem}

.card-actions{display:flex;align-items:center;padding:.22rem .35rem .3rem;border-top:1px solid rgba(255,255,255,.04);gap:.15rem}

/* ── 유사작 섹션 ── */
.sim-bar{border-top:1px solid rgba(255,255,255,.04);padding:.18rem .35rem}
.sim-btn{width:100%;background:none;border:none;color:rgba(255,255,255,.22);font-size:.58rem;font-family:inherit;cursor:pointer;text-align:left;padding:.1rem 0;transition:color .1s;display:flex;align-items:center;gap:.25rem}
.sim-btn:hover{color:rgba(139,92,246,.75)}
.sim-strip{display:none;flex-direction:column;gap:.22rem;margin-top:.25rem;padding-bottom:.18rem}
.sim-strip.open{display:flex}
.sim-item{display:flex;align-items:center;gap:.35rem;cursor:pointer;padding:.15rem .1rem;border-radius:6px;transition:background .1s}
.sim-item:hover{background:rgba(255,255,255,.05)}
.sim-item-thumb{width:22px;height:33px;border-radius:3px;object-fit:cover;background:#182038;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:rgba(255,255,255,.2)}
.sim-item-info{flex:1;min-width:0}
.sim-item-title{font-size:.62rem;color:#c8d8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.sim-item-meta{font-size:.55rem;color:rgba(255,255,255,.3)}
.sim-empty{font-size:.6rem;color:rgba(255,255,255,.2);padding:.1rem .1rem}
.fav-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:.08rem .12rem;line-height:1;transition:transform .15s,color .15s;flex-shrink:0;color:rgba(255,255,255,.25)}
.fav-btn:hover{transform:scale(1.25);color:#fbbf24}
.fav-btn.active{color:#fbbf24;filter:drop-shadow(0 0 5px rgba(251,191,36,.7));transform:scale(1.05)}
.card-act-right{display:flex;gap:.15rem;margin-left:auto}
.icon-btn{background:rgba(255,255,255,.04);border:none;cursor:pointer;font-size:.64rem;padding:.14rem .38rem;border-radius:6px;color:rgba(255,255,255,.3);transition:all .1s}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.icon-btn.del:hover{background:rgba(239,68,68,.18);color:#f87171}

/* ── 즐겨찾기 패널 ── */
.fav-panel{position:fixed;top:0;right:0;width:340px;max-width:100vw;height:100vh;height:100dvh;background:#0f1824;border-left:1px solid rgba(255,255,255,.08);z-index:2000;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow:hidden}
.fav-panel.open{transform:translateX(0)}
@media(max-width:400px){.fav-panel{width:100vw;border-left:none}}
.fav-panel-header{padding:.8rem 1rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.fav-panel-header h3{font-size:.88rem;font-weight:700;color:#fbbf24;flex:1}
.fav-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:1.2rem;cursor:pointer;padding:.1rem}
.fav-close:hover{color:#fff}
.fav-cat-bar{padding:.5rem .8rem;border-bottom:1px solid rgba(255,255,255,.06);display:flex;flex-wrap:wrap;gap:.25rem;align-items:center;flex-shrink:0}
.fav-cat-chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);padding:.18rem .6rem;border-radius:12px;cursor:pointer;font-size:.68rem;font-weight:600;transition:all .12s;font-family:inherit}
.fav-cat-chip:hover{background:rgba(255,255,255,.1);color:#fff}
.fav-cat-chip.active{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.35);color:#fbbf24}
.add-cat-btn{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);color:#e8a020;padding:.18rem .5rem;border-radius:12px;cursor:pointer;font-size:.68rem;font-family:inherit;transition:all .12s}
.add-cat-btn:hover{background:rgba(232,160,32,.2)}
.fav-list{flex:1;overflow-y:auto;padding:.5rem .8rem}
.fav-item{display:flex;align-items:center;gap:.5rem;padding:.4rem .5rem;border-radius:8px;margin-bottom:.2rem;cursor:pointer;transition:background .1s}
.fav-item:hover{background:rgba(255,255,255,.04)}
.fav-item-poster{width:28px;height:42px;border-radius:4px;object-fit:cover;background:#182038;flex-shrink:0}
.fav-item-info{flex:1;min-width:0}
.fav-item-title{font-size:.74rem;font-weight:600;color:#dde8f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-item-meta{font-size:.62rem;color:rgba(255,255,255,.3);margin-top:.1rem}
.fav-item-del{background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:.75rem;padding:.15rem;flex-shrink:0}
.fav-item-del:hover{color:#f87171}
.fav-empty{text-align:center;padding:2rem 1rem;color:rgba(255,255,255,.18);font-size:.78rem;line-height:1.8}

/* ── 빈 화면 ── */
.empty-message{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:rgba(255,255,255,.15);font-size:.83rem;line-height:2.2}
.em-icon{font-size:2.4rem;display:block;margin-bottom:.55rem;opacity:.22}

/* ── 진행 패널 ── */
.progress-panel{position:fixed;bottom:0;left:0;right:0;background:#0b1120;border-top:1px solid rgba(255,255,255,.07);color:#d1deff;padding:.48rem 1.1rem;display:flex;flex-wrap:wrap;gap:.48rem;align-items:center;font-size:.7rem;z-index:1000}
.pb-wrap{flex:3;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.pb-fill{width:0%;height:100%;background:#e8a020;transition:width .15s;border-radius:3px}
.pb-stat{font-family:monospace;background:rgba(255,255,255,.06);padding:.1rem .4rem;border-radius:8px}

/* ── 모달 ── */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:2000;padding:1rem}
.modal-box{background:#131b2c;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.15rem;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;position:relative}
.modal-box h3{font-size:.88rem;margin-bottom:.75rem;color:#e8edf5;display:flex;align-items:center;gap:.4rem}
.modal-close{position:absolute;top:12px;right:15px;font-size:1.15rem;cursor:pointer;background:none;border:none;color:rgba(255,255,255,.35)}
.modal-close:hover{color:#fff}
.mfield{width:100%;padding:.42rem .65rem;margin:.25rem 0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2e8f0;font-family:inherit;font-size:.8rem}
.mfield:focus{outline:none;border-color:#e8a020}
.mfield option{background:#131b2c}
.mlabel{font-size:.7rem;color:rgba(255,255,255,.38);margin:.4rem 0 .1rem;display:block}
.mactions{display:flex;gap:.4rem;margin-top:.75rem}
.msave{background:#e8a020;border:none;color:#111;padding:.46rem .95rem;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.8rem}
.mcancel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#e2e8f0;padding:.46rem .85rem;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.8rem}


/* ── 설정 배너 ── */
.setup-banner{max-width:1440px;margin:.6rem auto 0;padding:0 1.1rem}
.setup-card{background:#131b2c;border:1.5px dashed rgba(232,160,32,.32);border-radius:13px;padding:.85rem 1.1rem;display:flex;flex-wrap:wrap;align-items:center;gap:.7rem}
.sc-text h3{font-size:.82rem;font-weight:700;color:#e8a020;margin-bottom:.2rem}
.sc-text p{font-size:.7rem;color:rgba(255,255,255,.38);line-height:1.6}
.sc-text p b{color:rgba(255,255,255,.58)}
.sc-actions{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.folder-status{font-size:.66rem;padding:.18rem .5rem;border-radius:9px;font-weight:600}
.folder-status.ok{background:rgba(52,211,153,.1);color:#6ee7b7;border:1px solid rgba(52,211,153,.22)}
.folder-status.none{background:rgba(255,255,255,.04);color:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.07)}

/* ── 맨위로 버튼 ── */
.scroll-top-btn{position:fixed;bottom:3.5rem;right:1.2rem;width:2.4rem;height:2.4rem;background:#e8a020;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#111;box-shadow:0 4px 14px rgba(0,0,0,.4);z-index:300;opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s}
.scroll-top-btn.visible{opacity:1;transform:translateY(0)}
.scroll-top-btn:hover{background:#f0b030;transform:translateY(-2px)}

/* ── 디버그 ── */
.debug-panel{position:fixed;bottom:48px;left:10px;background:rgba(0,0,0,.8);color:#4ade80;font-size:.58rem;padding:3px 8px;border-radius:6px;z-index:999;max-width:88%;pointer-events:none}

/* ── 통계 모달 ── */
.stat-modal-box{max-width:720px}
.stat-tabs{display:flex;gap:.3rem;margin-bottom:.8rem;flex-wrap:wrap}
.stat-tab{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);padding:.28rem .7rem;border-radius:14px;cursor:pointer;font-size:.71rem;font-weight:600;font-family:inherit;transition:all .12s}
.stat-tab.active{background:#e8a020;color:#111;border-color:#e8a020}
.stat-chart-area{background:rgba(255,255,255,.02);border-radius:10px;padding:.8rem;min-height:220px}
.bar-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.bar-label{font-size:.68rem;color:rgba(255,255,255,.5);width:80px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#e8a020;transition:width .4s}
.bar-fill.blue{background:#3b82f6}
.bar-fill.green{background:#10b981}
.bar-fill.purple{background:#8b5cf6}
.bar-count{font-size:.66rem;color:rgba(255,255,255,.4);width:30px;flex-shrink:0}

/* ── 도움말 모달 ── */
.help-modal-box{max-width:640px}
.help-section{margin-bottom:1rem}

<script>
// ══════════════════════════════════════════════════════════════
// DB v9 추가사항:
// · HYPERLINK 수식 파싱 수정 → 제목·링크 정확히 추출
// · 카드 6열 레이아웃 (wide screen 기준)
// · 유사작 추천 (카드 하단 버튼 → 장르+태그 기반 5편)
// · 도움말 v9 업데이트
// ══════════════════════════════════════════════════════════════

const DB_NAME='MovieDB_v18', DB_VER=18;
const ST_ITEMS='items', ST_IMAGES='images', ST_FAVS='favs';

// ── GitHub 설정 ──────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════
// GitHub 설정 — 저장소 루트 경로를 정확히 입력하세요
// ══════════════════════════════════════════════════════════════
function getGithubBase(){ return localStorage.getItem('gh_base')||'https://casio8000.github.io/film-humanities_Mobile'; }
function getGithubExcelUrl(){ return getGithubBase()+'/movie_list_complete.xlsx'; }
function getGithubImageUrl(no){
  if(!no) return null;
  let folder;
  if(no<=1000)      folder='images/movie';
  else if(no<=2000) folder='images/movie_2';
  else if(no<=3000) folder='images/movie_3';
  else              folder='images/movie_4';
  return getGithubBase()+'/'+folder+'/'+no+'.jpg';
}

// GitHub 연결 진단 함수
async function diagnosGithub(){
  const base=getGithubBase();
  const excelUrl=getGithubExcelUrl();
  const imgUrl=getGithubImageUrl(1);
  const results=[];
  for(const [label,url] of [['엑셀',excelUrl],['이미지(1.jpg)',imgUrl]]){
    try{
      const r=await fetch(url,{method:'HEAD',cache:'no-cache'});
      results.push({label,ok:r.ok,status:r.status,url});
    }catch(e){
      results.push({label,ok:false,status:'네트워크 오류',url,err:e.message});
    }
  }
  return results;
}

// 이미지 일괄 동기화 — 없는 이미지만 GitHub에서 fetch
async function syncImagesFromGithub(items, onProgress){
  const missing=items.filter(i=>i.excelNo&&!imgUrlCache.has(i.excelNo));
  if(!missing.length) return {done:0,failed:0,total:0};
  let done=0,failed=0;
  const BATCH=5; // 동시 요청 수
  for(let i=0;i<missing.length;i+=BATCH){
    const batch=missing.slice(i,i+BATCH);
    await Promise.allSettled(batch.map(async item=>{
      const url=getGithubImageUrl(item.excelNo);
      if(!url) return;
      try{
        const already=await idbGet(ST_IMAGES,item.excelNo).catch(()=>null);
        if(already&&already.blob){ done++; return; }
        const resp=await fetch(url,{cache:'force-cache'});
        if(!resp.ok){ failed++; return; }
        const blob=await resp.blob();
        if(!blob.size){ failed++; return; }
        const resized=await resizeBlob(blob,300).catch(()=>blob);
        await saveImageByNo(item.excelNo,resized,null);
        const objUrl=URL.createObjectURL(resized);
        imgUrlCache.set(item.excelNo,objUrl);
        done++;
      }catch(e){ failed++; }
    }));
    if(onProgress) onProgress(done+failed, missing.length, done, failed);
    await new Promise(r=>setTimeout(r,50)); // 과부하 방지
  }
  return {done,failed,total:missing.length};
}

async function openImgSyncModal(){
  const modal=document.createElement('div');modal.className='modal';
  const base=getGithubBase();
  modal.innerHTML=`<div class="modal-box" style="max-width:480px">
    <button class="modal-close">&times;</button>
    <h3>🖼️ GitHub 이미지 동기화</h3>
    <div style="background:rgba(52,160,240,.07);border:1px solid rgba(52,160,240,.2);border-radius:9px;padding:.7rem .9rem;font-size:.72rem;color:rgba(255,255,255,.55);line-height:1.75;margin:.5rem 0">
      GitHub <code>${base}</code>의 이미지 폴더에서 로컬 IndexedDB로 포스터를 동기화합니다.<br>
      이미 저장된 이미지는 건너뛰고, 없는 이미지만 다운로드합니다.
    </div>
    <div id="imgSyncDiag" style="font-size:.7rem;color:rgba(255,255,255,.4);margin-bottom:.5rem">연결 확인 중…</div>
    <div class="mactions" style="flex-wrap:wrap;gap:.4rem">
      <button class="msave" id="imgSyncStart">🖼️ 이미지 동기화 시작</button>
      <button id="imgSyncDiagBtn" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#e2e8f0;padding:.46rem .85rem;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.8rem">🔍 연결 진단</button>
      <button class="mcancel" id="imgSyncCancel">닫기</button>
    </div>
    <div id="imgSyncProgress" style="margin-top:.6rem;font-size:.72rem;color:rgba(255,255,255,.4)"></div>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('.modal-close').onclick=()=>modal.remove();
  modal.querySelector('#imgSyncCancel').onclick=()=>modal.remove();
  modal.onclick=e=>{if(e.target===modal)modal.remove();};

  const diagEl=modal.querySelector('#imgSyncDiag');
  const progEl=modal.querySelector('#imgSyncProgress');

  // 자동 진단
  const runDiag=async()=>{
    diagEl.innerHTML='<span style="color:#fbbf24">⏳ GitHub 연결 확인 중…</span>';
    const results=await diagnosGithub();
    const lines=results.map(r=>r.ok
      ?`<span style="color:#6ee7b7">✅ ${r.label}: 정상 (${r.status})</span>`
      :`<span style="color:#f87171">❌ ${r.label}: ${r.status}${r.err?' — '+r.err:''}</span>`
    );
    diagEl.innerHTML=lines.join('<br>');
    return results.every(r=>r.ok);
  };

  await runDiag();
  modal.querySelector('#imgSyncDiagBtn').onclick=runDiag;

  modal.querySelector('#imgSyncStart').onclick=async()=>{
    const ok=await runDiag();
    if(!ok){
      progEl.innerHTML='<span style="color:#f87171">❌ GitHub에 연결할 수 없습니다. 저장소 설정과 Pages 활성화를 확인하세요.</span>';
      return;
    }
    modal.querySelector('#imgSyncStart').disabled=true;
    modal.querySelector('#imgSyncStart').textContent='동기화 중…';
    const items=await loadAllItems();
    progEl.innerHTML='시작 중…';
    const {done,failed,total}=await syncImagesFromGithub(items,(cur,tot,d,f)=>{
      progEl.innerHTML=`⬇️ ${cur}/${tot} — ✅ ${d}개 저장, ❌ ${f}개 실패`;
    });
    await refreshData();
    modal.querySelector('#imgSyncStart').disabled=false;
    modal.querySelector('#imgSyncStart').textContent='🖼️ 이미지 동기화 시작';
    progEl.innerHTML=`<span style="color:#6ee7b7">✅ 완료 — ${done}개 저장, ${failed}개 실패 (전체 ${total}개 대상)</span>`;
    showToast(`이미지 동기화 완료 — ${done}개 저장`, 'success', 4000);
  };
}

async function loadExcelFromGithub(force=false){
  const items=await loadAllItems().catch(()=>[]);
  if(!force && items.length>0){
    debug('데이터 있음 — GitHub 로드 스킵');
    return false;
  }
  const excelUrl=getGithubExcelUrl();
  showToast('GitHub 엑셀 다운로드 중…', 'info', 0);
  try{
    const resp=await fetch(excelUrl,{cache:'no-cache'});
    if(!resp.ok){
      let hint='';
      if(resp.status===404) hint='\n→ 저장소 루트에 movie_list_complete.xlsx 업로드 필요';
      else if(resp.status===403) hint='\n→ GitHub Pages가 비활성화됐거나 저장소가 Private\n→ Settings → Pages → main/root 활성화';
      showToast('❌ HTTP '+resp.status+hint, 'error', 10000);
      return false;
    }
    const buf=await resp.arrayBuffer();
    const n=await importFromExcel(buf);
    showToast(`✅ ${n.toLocaleString()}개 작품 로드 완료`, 'success', 4000);
    await refreshData();
    const loaded=await loadAllItems();
    const noTagCount=loaded.filter(i=>!(i.hashTags&&i.hashTags.length)).length;
    if(noTagCount>0){
      showToast(`🤖 감정태그 자동 분류 중… (${noTagCount}개)`, 'info', 3000);
      await autoTagAll(false);
      await refreshData();
      showToast('✅ 태그 분류 완료', 'success', 3000);
    }
    return true;
  }catch(e){
    const isNet=e.message.toLowerCase().includes('fetch')||e.message.includes('network');
    const hint=isNet?'\n→ 인터넷 연결과 GitHub Pages URL을 확인하세요\n→ URL: '+excelUrl:'';
    showToast('❌ GitHub 로드 실패: '+e.message+hint, 'error', 10000);
    console.error('GitHub Excel load error:', e, excelUrl);
    return false;
  }
}

const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChosung(str){
  return [...str].map(c=>{
    const code=c.charCodeAt(0)-0xAC00;
    if(code<0||code>11171)return c;
    return CHOSUNG[Math.floor(code/588)];
  }).join('');
}
function matchSearch(title, kw){
  const t=String(title||'').replace(/\s+/g,'').toLowerCase();
  const k=kw.replace(/\s+/g,'').toLowerCase();
  if(!k)return true;
  // 직접 포함
  if(t.includes(k))return true;
  // 초성 검색
  const tCs=getChosung(t);
  const kCs=getChosung(k);
  if(tCs.includes(k)||t.includes(kCs))return true;
  return false;
}

function initDB(){return new Promise((res,rej)=>{
  const req=indexedDB.open(DB_NAME,DB_VER);
  req.onerror=()=>rej(req.error);
  req.onsuccess=()=>{db=req.result;res();};
  req.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains(ST_ITEMS))d.createObjectStore(ST_ITEMS,{keyPath:'id',autoIncrement:true});
    if(!d.objectStoreNames.contains(ST_IMAGES))d.createObjectStore(ST_IMAGES,{keyPath:'no'});
    if(!d.objectStoreNames.contains(ST_FAVS)){
      const fs=d.createObjectStore(ST_FAVS,{keyPath:'id',autoIncrement:true});
      fs.createIndex('itemId','itemId',{unique:false});
    }
  };
});}

const mkTx=(s,m)=>db.transaction(s,m).objectStore(s);
const idbAll=s=>new Promise((r,j)=>{const q=mkTx(s,'readonly').getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>j(q.error);});
const idbGet=(s,k)=>new Promise((r,j)=>{const q=mkTx(s,'readonly').get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const idbPut=(s,v)=>new Promise((r,j)=>{const q=mkTx(s,'readwrite').put(v);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const idbDel=(s,k)=>new Promise((r,j)=>{const q=mkTx(s,'readwrite').delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error);});
function idbAddFav(val){return new Promise((r,j)=>{
  const q=mkTx(ST_FAVS,'readwrite').add(val);
  q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);
});}

async function loadAllItems(){return idbAll(ST_ITEMS);}
async function loadImageByNo(no){
  const r=await idbGet(ST_IMAGES,no);
  return r?{blob:r.blob,fileDate:r.fileDate||null}:null;
}
async function saveImageByNo(no,blob,fileDate){
  return idbPut(ST_IMAGES,{no,blob,savedAt:Date.now(),fileDate:fileDate||null});
}
async function saveItem(item){
  const newId=await idbPut(ST_ITEMS,item);
  if(!item.id)item.id=newId;
  return item;
}

const GALLOWED=new Set(['액션','드라마','코미디','로맨스','스릴러','공포','SF','판타지','미스터리','범죄','모험','전쟁','애니메이션','다큐','사극','가족','스포츠','법정','성인','재난','정치','의학','서부','기타']);
const normGenre=g=>{const t=(g||'').trim(),m=GMAP[t]||t;return GALLOWED.has(m)?m:'기타';};
const parseGenres=raw=>{if(!raw)return['기타'];const l=[...new Set(raw.split(',').map(g=>normGenre(g)))];return l.length?l:['기타'];};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function extractEpisode(runtime){
  if(!runtime)return '';
  const m=runtime.match(/(\d+)\s*[화부회편]/);
  return m?m[1]+'화':'';
}

function resizeBlob(src,maxW=300){return new Promise((res,rej)=>{
  const url=URL.createObjectURL(src instanceof Blob?src:new Blob([src]));
  const img=new Image();
  img.onload=()=>{URL.revokeObjectURL(url);
    let w=img.width,h=img.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(b=>b?res(b):rej(new Error('toBlob')),'image/jpeg',.82);
  };
  img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('load'));};
  img.src=url;
});}

function resizeFile(file,maxW=300){return new Promise((res,rej)=>{
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{URL.revokeObjectURL(url);
    let w=img.width,h=img.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(b=>b?res(b):rej(new Error('toBlob')),'image/jpeg',.82);
  };
  img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('load'));};
  img.src=url;
});}

// ══════════════════════════════════════════════════════════════
// 엑셀 파싱 (전체 행 읽기 - A열 마지막까지)
// B열 =HYPERLINK("url","제목") 수식 완전 지원
// ══════════════════════════════════════════════════════════════

// HYPERLINK 수식 파싱 — "=HYPERLINK("url","제목")" 형태 처리
function parseTitleCell(raw) {
  if (raw == null || raw === '') return { text: '', url: '' };
  const s = String(raw);
  // =HYPERLINK("url","제목") or HYPERLINK("url","제목")
  const m = s.match(/=?\s*HYPERLINK\s*\(\s*"([^"]*)"\s*,\s*"([^"]*)"\s*\)/i);
  if (m) return { url: m[1].trim(), text: m[2].trim() };
  // 일반 텍스트
  return { text: s.trim(), url: '' };
}

async function importFromExcel(buf){
  // cellFormula:true 로 수식 문자열도 함께 읽음
  const wb=XLSX.read(buf,{type:'array', cellFormula:true, cellText:false});
  const ws=wb.Sheets[wb.SheetNames[0]];

  // A열 기반 범위 계산 — !ref 범위 전체 포함
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:false,raw:true});

  let hIdx=-1;
  for(let i=0;i<Math.min(rows.length,5);i++){
    if(String(rows[i][0]).trim()==='NO' && String(rows[i][1]).trim()==='한글제목'){hIdx=i;break;}
  }
  if(hIdx<0)throw new Error('헤더를 찾을 수 없습니다 (NO·한글제목 필요)');

  const H={};
  rows[hIdx].forEach((h,i)=>{
    const hs=String(h).trim();
    if(hs==='NO')H.no=i; if(hs==='한글제목')H.title=i; if(hs==='평점')H.rating=i;
    if(hs==='국가')H.country=i; if(hs==='개봉연도')H.year=i; if(hs==='카테고리')H.cat=i;
    if(hs==='장르')H.genre=i; if(hs==='러닝타임/화수')H.runtime=i;
    if(hs==='비고'||hs==='태그'||hs==='감정태그')H.tags=i;
    if(hs==='감독/주연')H.director=i;
    if(hs==='OST'||hs==='YouTube OST')H.ost=i;
    if(hs==='인문학노트'||hs==='메모')H.note=i;
    if(hs==='감상일'||hs==='관람일'||hs==='관람날짜')H.viewDate=i;
  });

  // NO 열(A열) 기준: 숫자이면 유효 행
  const dataRows=rows.slice(hIdx+1).filter(r=>{
    const v=r[H.no];
    if(v===undefined||v==='')return false;
    const n=parseFloat(String(v).trim());
    return !isNaN(n)&&n>0;
  });

  // SheetJS가 HYPERLINK 수식을 원문으로 돌려줄 경우를 위해
  // ws 셀 직접 접근으로 .f(수식) 또는 .v(값) 확인
  const cellRef=(colIdx,rowIdx)=>{
    const col=XLSX.utils.encode_col(colIdx);
    const row=XLSX.utils.encode_row(hIdx+1+rowIdx);
    return ws[col+row];
  };

  const now=Date.now();
  const items=[];
  let dataIdx=0;
  for(const row of dataRows){
    const no=parseInt(String(row[H.no]).trim());

    // 제목·링크 추출 — 수식문자열, 셀값, 직접접근 3중 폴백
    let title='', excelUrl='';
    if(H.title!==undefined){
      const raw=row[H.title];
      const parsed=parseTitleCell(raw);
      title=parsed.text;
      excelUrl=parsed.url;
      // SheetJS가 평가된 값(.v)을 이미 준 경우 수식 파싱 불필요 — 단 HYPERLINK 수식은 .f에 있음
      if(!title || title.startsWith('=') || /HYPERLINK/i.test(title)){
        // 셀 직접 접근 시도
        const wsCell=cellRef(H.title, dataIdx);
        if(wsCell){
          if(wsCell.l&&wsCell.l.Target) excelUrl=wsCell.l.Target;
          // .v 는 display 텍스트
          if(wsCell.v&&!String(wsCell.v).startsWith('=')) title=String(wsCell.v).trim();
          else if(wsCell.f){ const fp=parseTitleCell('='+wsCell.f); if(fp.text) title=fp.text; if(fp.url) excelUrl=fp.url; }
        }
      }
    }
    if(!title || /^=?HYPERLINK/i.test(title)) title=`(제목없음-${no})`;

    const rv=row[H.rating];
    const rating=(rv!==''&&rv!==undefined&&!isNaN(parseFloat(rv)))?parseFloat(rv).toFixed(1):'?';
    const country=String(row[H.country]||'').trim()||'미분류';
    let year=String(row[H.year]||'').replace('.0','').trim();
    if(!year||isNaN(parseInt(year)))year='';
    const category=String(row[H.cat]||'영화').trim();
    const genreRaw=String(row[H.genre]||'기타').trim();
    const runtime=String(row[H.runtime]||'—').trim();
    const genreList=parseGenres(genreRaw);
    const link=excelUrl||`https://search.naver.com/search.naver?query=${encodeURIComponent(title+' '+category)}`;
    const tagsRaw=H.tags!==undefined?String(row[H.tags]||'').trim():'';
    // 감정태그만 허용 (감독/주연 데이터 완전 차단)
    const hashTags=(tagsRaw && !/^감독:/i.test(tagsRaw) && !/^주연:/i.test(tagsRaw) && !/감독:/i.test(tagsRaw))
      ?tagsRaw.split(/[,#\s]+/).map(t=>t.trim()).filter(t=>t.length>1).map(t=>t.startsWith('#')?t:'#'+t)
        .filter(t=>EMOTION_TAGS.some(e=>e.tag===t)) // EMOTION_TAGS 목록에 있는 것만 허용
      :[];
    const ostLink=H.ost!==undefined?String(row[H.ost]||'').trim():'';
    const humNote=H.note!==undefined?String(row[H.note]||'').trim():'';
    // J열 감상일 → timestamp (정렬용)
    let viewDate=null;
    if(H.viewDate!==undefined && row[H.viewDate]!==undefined && row[H.viewDate]!==''){
      const vd=row[H.viewDate];
      if(typeof vd==='number'){
        // Excel 날짜 직렬화 숫자 → JS Date
        const d=new Date(Math.round((vd-25569)*86400*1000));
        if(!isNaN(d.getTime())) viewDate=d.getTime();
      } else {
        const d=new Date(String(vd).trim());
        if(!isNaN(d.getTime())) viewDate=d.getTime();
      }
    }
    items.push({title,rating,country,year,category,genreRaw,genreList,runtime,link,excelNo:no,addedAt:now,hashTags,ostLink,humNote,viewDate});
    dataIdx++;
  }

  // ── 기존 데이터에서 excelNo 기준으로 이미지·태그·메모 보존 맵 구성 ──
  const old = await loadAllItems();
  // excelNo → 기존 항목 맵 (수동 편집된 태그·메모·ostLink 보존용)
  const oldMap = new Map();
  old.forEach(o => { if(o.excelNo) oldMap.set(o.excelNo, o); });

  // 새 항목에 기존 수동 데이터 병합
  for(const it of items){
    const prev = oldMap.get(it.excelNo);
    if(prev){
      // hashTags: 엑셀에 태그가 없고 기존에 수동 태그가 있으면 보존
      if((!it.hashTags || !it.hashTags.length) && prev.hashTags && prev.hashTags.length){
        it.hashTags = prev.hashTags;
      }
      // humNote: 엑셀에 없으면 기존 보존
      if(!it.humNote && prev.humNote) it.humNote = prev.humNote;
      // ostLink: 엑셀에 없으면 기존 보존
      if(!it.ostLink && prev.ostLink) it.ostLink = prev.ostLink;
      // addedAt 보존 (최초 추가 시점 유지)
      if(prev.addedAt) it.addedAt = prev.addedAt;
    }
  }

  // 기존 데이터 삭제 후 새로 저장 (이미지는 ST_IMAGES에 별도 보존됨)
  for(const o of old) await idbDel(ST_ITEMS, o.id).catch(()=>{});
  for(const it of items) await saveItem(it);
  curSort='fileDateDesc'; sortSelect.value='fileDateDesc';

  // ── 데이터 품질 검사 ──
  const issues=[];
  // NO 누락 (원본 rows에서 NO가 비어있는 데이터 행)
  const missingNo=rows.slice(hIdx+1).filter(r=>{
    const v=r[H.no];
    if(v===undefined||v==='')return true;
    const n=parseFloat(String(v).trim());
    return isNaN(n)||n<=0;
  }).length;
  if(missingNo>0) issues.push(`⚠️ NO(연번) 누락 행: ${missingNo}건 — A열을 확인하세요`);
  // 제목 중복 검사
  const titleCount={};
  items.forEach(i=>{ titleCount[i.title]=(titleCount[i.title]||0)+1; });
  const dupTitles=Object.entries(titleCount).filter(([,c])=>c>1).map(([t,c])=>`"${t}"(${c}건)`);
  if(dupTitles.length) issues.push(`⚠️ 중복 제목 ${dupTitles.length}건:\n${dupTitles.slice(0,8).join(', ')}${dupTitles.length>8?` 외 ${dupTitles.length-8}건`:''}`);
  // 경고 팝업 (닫을 때까지 유지 — 모달 형태)
  if(issues.length){
    setTimeout(()=>showDataWarningModal(issues),400);
  }

  return items.length;
}

// ══════════════════════════════════════════════════════════════
// 폴더 → IndexedDB 이미지 자동 저장 (파일 수정날짜 저장 포함)
// ══════════════════════════════════════════════════════════════
function extractNo(filename){
  const name=filename.replace(/\.[^.]+$/,'');
  const m=name.match(/^(\d+)(?:[_\s\-.]|$)/)||name.match(/^(\d+)$/);
  return m?parseInt(m[1]):null;
}

async function scanAndSaveFolder(handle){
  const imageExts=/\.(jpe?g|png|webp|gif|bmp)$/i;
  progressPanel.style.display='flex';
  progressFName.innerText='폴더 스캔 및 이미지 저장중…';
  progressFill.style.width='0%';

  const items=await loadAllItems();
  const validNos=new Set(items.map(i=>i.excelNo).filter(Boolean));

  const allFiles=[];
  for await(const [name,entry] of handle.entries()){
    if(entry.kind==='file'&&imageExts.test(name)){
      const no=extractNo(name);
      if(no!==null&&validNos.has(no))allFiles.push({name,entry,no});
    }
  }

  let saved=0,skipped=0;
  for(let i=0;i<allFiles.length;i++){
    const {entry,no}=allFiles[i];
    try{
      // 이미 저장된 것은 스킵
      const existing=await idbGet(ST_IMAGES,no);
      if(existing){skipped++;continue;}
      const file=await entry.getFile();
      // 파일 수정날짜 저장 (관람일 기준 정렬용)
      const fileDate=file.lastModified||null;
      const blob=await resizeBlob(file);
      await saveImageByNo(no,blob,fileDate);
      saved++;
    }catch(e){/* skip */}
    const pct=((i+1)/allFiles.length*100).toFixed(0);
    progressFill.style.width=pct+'%';
    progressStats.innerText=`✅${saved} ⏭️${skipped} (${i+1}/${allFiles.length})`;
    progressFName.innerText=allFiles[i].name;
    if(i%30===0)await new Promise(r=>setTimeout(r,1));
  }
  progressPanel.style.display='none';
  return {total:allFiles.length,saved,skipped};
}

async function selectFolder(){
  if(!('showDirectoryPicker' in window)){
    alert('Chrome 또는 Edge 브라우저에서만 지원됩니다.');return;
  }
  try{
    const handle=await window.showDirectoryPicker({mode:'read'});
    folderHandle=handle;
    updateFolderBanner(handle.name,'scanning');
    const {total,saved,skipped}=await scanAndSaveFolder(handle);
    updateFolderBanner(handle.name,'ok',`이미지 ${total}개 중 ${saved}개 새로 저장, ${skipped}개 기존 유지`);
    clearImgCache();
    await refreshData();
    showToast(`이미지 로딩 완료 — ${total}개 처리 (신규 ${saved}개 저장). 정렬·필터 정상 사용 가능합니다.`, 'success', 6000);
  }catch(e){
    if(e.name!=='AbortError')alert('폴더 선택 오류: '+e.message);
  }
}

function updateFolderBanner(name,state,detail=''){
  debug(`폴더: ${name} [${state}] ${detail}`);
}
async function addNewImages(){
  if(!folderHandle){await selectFolder();return;}
  const {total,saved,skipped}=await scanAndSaveFolder(folderHandle);
  clearImgCache();
  alert(`새 이미지 추가 완료\n✅ 저장: ${saved}개  ⏭️ 유지: ${skipped}개`);
  await refreshData();
}

// 이미지 캐시 관리 (ObjectURL 재사용)
// ══════════════════════════════════════════════════════════════
function clearImgCache(){
  imgUrlCache.forEach(url=>URL.revokeObjectURL(url));
  imgUrlCache.clear();
}

// ── GitHub 이미지 fetch & IndexedDB 캐시 저장 ──
async function fetchAndCacheGithubImage(no){
  const url=getGithubImageUrl(no);
  if(!url) return null;
  try{
    const resp=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!resp.ok) return null;
    const blob=await resp.blob();
    if(!blob.size) return null;
    const resized=await resizeBlob(blob,300).catch(()=>blob);
    await saveImageByNo(no,resized,null);
    const objUrl=URL.createObjectURL(resized);
    imgUrlCache.set(no,objUrl);
    return objUrl;
  }catch(e){ return null; }
}

async function getCachedImgUrl(no){
  if(imgUrlCache.has(no))return imgUrlCache.get(no);
  // 1. IndexedDB 확인
  const r=await idbGet(ST_IMAGES,no).catch(()=>null);
  if(r&&r.blob){
    const url=URL.createObjectURL(r.blob);
    imgUrlCache.set(no,url);
    return url;
  }
  // 2. GitHub 이미지 폴백 (모바일 등 IndexedDB 비어있을 때)
  return await fetchAndCacheGithubImage(no);
}

// 이미지 날짜 맵 (no → fileDate) — 정렬용
let imgDateMap=new Map();
async function loadImgDateMap(){
  const all=await idbAll(ST_IMAGES);

function saveFavCatsLocal(){
  try{localStorage.setItem('favCats_v16',JSON.stringify(favCats));}catch(e){}
}
function loadFavCatsLocal(){
  try{const s=localStorage.getItem('favCats_v16');if(s)favCats=JSON.parse(s);}catch(e){}
}

async function loadFavs(){
  const rows=await idbAll(ST_FAVS);
  favData={};
  rows.forEach(r=>{
    const key=String(r.itemId);
    if(!favData[key])favData[key]=[];
    favData[key].push({favId:r.id,cat:r.cat||'전체'});
  });
  const dbCats=['전체',...new Set(rows.map(r=>r.cat||'전체').filter(c=>c!=='전체'))];
  loadFavCatsLocal();
  const merged=['전체',...new Set([...favCats.filter(c=>c!=='전체'),...dbCats.filter(c=>c!=='전체')])];
  favCats=merged;
  saveFavCatsLocal();
}

function isItemFav(itemId,cat=''){
  const key=String(itemId);
  const favs=favData[key]||[];
  if(!cat||cat==='전체')return favs.length>0;
  return favs.some(f=>f.cat===cat);
}

function idbAddFav2(val){return new Promise((r,j)=>{
  const q=mkTx(ST_FAVS,'readwrite').add(val);
  q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);
});}

async function toggleFav(itemId,cat){
  if(!cat)cat='전체';
  const key=String(itemId);
  const favs=favData[key]||[];
  const existing=favs.find(f=>f.cat===cat);
  if(existing){
    await idbDel(ST_FAVS,existing.favId);
  } else {
    await idbAddFav2({itemId:Number(itemId),cat,addedAt:Date.now()});
  }
  await loadFavs();
}

async function addFavCategory(){
  const name=prompt('새 즐겨찾기 카테고리 이름:');
  if(!name||!name.trim())return;
  const n=name.trim();
  if(!favCats.includes(n)){favCats.push(n);saveFavCatsLocal();}
  curFavCat=n;
  renderFavCatBar();
  await renderFavList();
}

function renderFavCatBar(){
  favCatBar.innerHTML='';
  favCats.forEach((cat,idx)=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:relative;display:inline-flex;align-items:center;';
    const btn=document.createElement('button');
    btn.className='fav-cat-chip'+(curFavCat===cat?' active':'');
    btn.textContent=cat;
    btn.title=cat==='전체'?'전체 즐겨찾기':'클릭: 필터 | 우클릭: 편집/삭제';
    btn.onclick=async()=>{curFavCat=cat;renderFavCatBar();await renderFavList();};
    // 우클릭: 카테고리 이름 수정 or 삭제 (전체는 불가)
    if(cat!=='전체'){
      btn.oncontextmenu=e=>{
        e.preventDefault();
        showCatEditMenu(cat, idx, btn);
      };
    }
    wrap.appendChild(btn);
    favCatBar.appendChild(wrap);
  });
  const addBtn=document.createElement('button');
  addBtn.className='add-cat-btn';addBtn.textContent='+ 카테고리';
  addBtn.onclick=addFavCategory;
  favCatBar.appendChild(addBtn);
}

  // 이름 변경

  renameBtn.style.cssText='display:flex;align-items:center;gap:.4rem;width:100%;background:transparent;border:none;color:rgba(255,255,255,.65);padding:.3rem .5rem;border-radius:6px;cursor:pointer;font-size:.73rem;font-family:inherit;text-align:left';

  renameBtn.onclick=async()=>{
    menu.remove();

현재: "${cat}"
새 이름:`, cat);
    if(!newName||!newName.trim()||newName.trim()===cat)return;
    const n=newName.trim();
    if(favCats.includes(n)){alert('이미 존재하는 카테고리명입니다.');return;}
    // DB에서 해당 카테고리의 favs 업데이트
    const favRows=await idbAll(ST_FAVS);
    for(const row of favRows){
      if(row.cat===cat){
        await idbPut(ST_FAVS,{...row,cat:n});
      }
    }
    favCats[idx]=n;
    if(curFavCat===cat)curFavCat=n;
    saveFavCatsLocal();
    await loadFavs();
    renderFavCatBar();
    await renderFavList();
  };

  // 삭제
  const delBtn=document.createElement('button');
  delBtn.style.cssText='display:flex;align-items:center;gap:.4rem;width:100%;background:transparent;border:none;color:#f87171;padding:.3rem .5rem;border-radius:6px;cursor:pointer;font-size:.73rem;font-family:inherit;text-align:left';

(이 카테고리의 즐겨찾기 항목도 함께 삭제됩니다)`))return;
    // DB에서 해당 카테고리 favs 삭제
    const favRows=await idbAll(ST_FAVS);
    for(const row of favRows){
      if(row.cat===cat) await idbDel(ST_FAVS,row.id).catch(()=>{});

    if(curFavCat===cat)curFavCat='전체';
    saveFavCatsLocal();
    await loadFavs();
    renderFavCatBar();
    await renderFavList();
  };
  menu.appendChild(delBtn);

  document.body.appendChild(menu);
  const closeMenu=e=>{if(!menu.contains(e.target)&&e.target!==triggerEl){menu.remove();document.removeEventListener('mousedown',closeMenu);}};
  setTimeout(()=>document.addEventListener('mousedown',closeMenu),50);
}

async function renderFavList(){
  const items=await loadAllItems();
  const itemMap=new Map(items.map(i=>[i.id,i]));
  favListEl.innerHTML='';
  let favItems=[];
  Object.entries(favData).forEach(([idStr,favs])=>{
    const id=parseInt(idStr);
    const item=itemMap.get(id);
    if(!item)return;
    const inCat=curFavCat==='전체'?favs.length>0:favs.some(f=>f.cat===curFavCat);
    if(inCat)favItems.push(item);
  });
  if(!favItems.length){
    favListEl.innerHTML='<div class="fav-empty">⭐ 즐겨찾기가 없습니다<br>카드의 별표를 클릭해서 즉시 추가<br>우클릭으로 카테고리 지정 가능</div>';
    return;
  }
  for(const item of favItems){
    const div=document.createElement('div');div.className='fav-item';
    const bUrl=await getCachedImgUrl(item.excelNo);
    const posterEl=document.createElement(bUrl?'img':'div');
    posterEl.className='fav-item-poster';
    if(bUrl){posterEl.src=bUrl;}
    else{posterEl.style.cssText='display:flex;align-items:center;justify-content:center;font-size:.7rem;opacity:.3';posterEl.textContent='🎬';}
    div.onclick=()=>{scrollToCard(item.id);closeFavPanel();};
    const info=document.createElement('div');info.className='fav-item-info';
    info.innerHTML=`<div class="fav-item-title">${esc(item.title)}</div><div class="fav-item-meta">${item.year||''} ${item.country||''}</div>`;
    const delBtn=document.createElement('button');delBtn.className='fav-item-del';delBtn.textContent='✕';
    delBtn.onclick=async e=>{e.stopPropagation();
      const cat=curFavCat==='전체'?'전체':curFavCat;
      await toggleFav(item.id,cat);
      await renderFavList();
      await render();
    };
    div.append(posterEl,info,delBtn);
    favListEl.appendChild(div);
  }
}

function closeFavPanel(){showingFav=false;favPanel.classList.remove('open');}

  const el=document.querySelector(`[data-item-id="${itemId}"]`);

// ══════════════════════════════════════════════════════════════
// 정렬 (항상 rawItems 기준으로 재정렬 - 연속 정렬 버그 수정)
// ══════════════════════════════════════════════════════════════
function applySort(items,mode){
  const a=[...items]; // 항상 원본의 복사본 정렬
  switch(mode){
    case'fileDateDesc': // J열 감상일 내림차순 (최신 관람순)
      return a.sort((x,y)=>{
        const da=x.viewDate||imgDateMap.get(x.excelNo)||0;
        const db2=y.viewDate||imgDateMap.get(y.excelNo)||0;
        return db2-da;
      });
    case'fileDateAsc':
      return a.sort((x,y)=>{
        const da=x.viewDate||imgDateMap.get(x.excelNo)||9999999999999;
        const db2=y.viewDate||imgDateMap.get(y.excelNo)||9999999999999;
        return da-db2;
      });
    case'titleAsc':  return a.sort((x,y)=>String(x.title).localeCompare(String(y.title),'ko'));
    case'titleDesc': return a.sort((x,y)=>String(y.title).localeCompare(String(x.title),'ko'));
    case'noAsc':     return a.sort((x,y)=>(x.excelNo||0)-(y.excelNo||0));
    case'noDesc':    return a.sort((x,y)=>(y.excelNo||0)-(x.excelNo||0));
    case'ratingDesc':return a.sort((x,y)=>(parseFloat(y.rating)||0)-(parseFloat(x.rating)||0));
    case'yearDesc':  return a.sort((x,y)=>(parseInt(y.year)||0)-(parseInt(x.year)||0));
    default:return a;
  }
}

function filterByCat(items,cat){
  if(cat==='all')return items;
  if(cat==='movie'){
    let mv=items.filter(i=>i.category==='영화');
    if(curSubFilter){
      if(curSubFilter==='기타'){
        const known=['대한민국','한국','미국','일본','영국','프랑스','중국','이탈리아'];
        mv=mv.filter(i=>!known.some(k=>(i.country||'').includes(k)));
      } else {
        // '한국' 선택 시 '대한민국'도 포함
        const subKey=curSubFilter==='한국'?['한국','대한민국']:[curSubFilter];
        mv=mv.filter(i=>subKey.some(k=>(i.country||'').includes(k)));
      }
    }
    return mv;
  }
  if(cat==='drama'){
    let d=items.filter(i=>i.category==='드라마');
    if(curSubFilter){
      if(curSubFilter==='기타'){
        const known=['대한민국','한국','미국','일본','중국','영국'];
        d=d.filter(i=>!known.some(k=>(i.country||'').includes(k)));
      } else {
        // '한국' 선택 시 '대한민국'도 포함
        const subKey=curSubFilter==='한국'?['한국','대한민국']:[curSubFilter];
        d=d.filter(i=>subKey.some(k=>(i.country||'').includes(k)));
      }
    }
    return d;
  }
  if(cat==='documentary'){
    // category='다큐멘터리' 항목 먼저, 이후 장르에만 '다큐' 있는 항목
    const byCat=items.filter(i=>i.category==='다큐멘터리');
    const byGenre=items.filter(i=>{
      if(i.category==='다큐멘터리') return false;
      const gr=(i.genreRaw||'').split(',').map(g=>g.trim().toLowerCase());
      return gr.some(g=>g==='다큐'||g==='다큐멘터리');
    });
    let dc=[...byCat,...byGenre];
    if(curSubFilter){
      dc=dc.filter(i=>{
        const gr=(i.genreRaw||'').toLowerCase()+' '+(i.title||'').toLowerCase();
        return gr.includes(curSubFilter.toLowerCase());
      });
    }
    return dc;
  }
  // 기타: 영화·드라마 아니고, 다큐 조건도 아닌 것
  if(cat==='other') return items.filter(i=>{
    if(['영화','드라마','다큐멘터리'].includes(i.category)) return false;
    const gr=(i.genreRaw||'').split(',').map(g=>g.trim().toLowerCase());
    if(gr.some(g=>g==='다큐'||g==='다큐멘터리')) return false;
    return true;
  });
  return items;
}

// ── 유사작 추천 (비동기 청크 처리 — 브라우저 멈춤 방지)
async function getSimilarItems(item, n=5){
  const genres=new Set((item.genreList||[]).filter(g=>g!=='기타'));
  const tags=new Set(item.hashTags||[]);
  if(!genres.size&&!tags.size) return [];
  const CHUNK=200;
  const results=[];
  const pool=rawItems.filter(i=>i.id!==item.id);
  for(let i=0;i<pool.length;i+=CHUNK){
    const slice=pool.slice(i,i+CHUNK);
    for(const it of slice){
      let score=0;
      (it.genreList||[]).forEach(g=>{ if(genres.has(g)) score+=2; });
      (it.hashTags||[]).forEach(t=>{ if(tags.has(t)) score+=1; });
      if(score>0) results.push({item:it,score});
    }
    if(i+CHUNK<pool.length) await new Promise(r=>setTimeout(r,0)); // yield to browser
  }
  return results
    .sort((a,b)=>b.score-a.score||(parseFloat(b.item.rating)||0)-(parseFloat(a.item.rating)||0))
    .slice(0,n).map(x=>x.item);
}

// 이미지 순차 로드 (v24 방식 + 세마포어로 동시 4개 제한)
const IMG_FETCH_SEM={
  max:4, cur:0, queue:[],
  acquire(){return new Promise(res=>{if(this.cur<this.max){this.cur++;res();}else{this.queue.push(res);}});},
  release(){if(this.queue.length){this.queue.shift()();}else{this.cur--;}}
};
async function getCachedImgUrlSem(no){
  await IMG_FETCH_SEM.acquire();
  try{ return await getCachedImgUrl(no); }
  finally{ IMG_FETCH_SEM.release(); }
}

async function loadImagesForCards(cards, items){
  // 순차 로드: 카드 DOM이 이미 화면에 있는 상태에서 이미지만 주입
  for(let i=0;i<items.length;i++){
    const item=items[i];
    const card=cards[i];
    if(!card) continue;
    const pd=card.querySelector('.poster');
    if(!pd) continue;
    try{
      const bUrl=await getCachedImgUrlSem(item.excelNo);
      if(bUrl){
        const img=document.createElement('img');img.className='poster-img';img.alt=item.title;
        img.loading='lazy';
        const g=(item.genreList||[]).filter(g=>g!=='기타')[0]||'';
        img.onerror=()=>{
          pd.innerHTML='<div class="poster-placeholder">'
            +'<span class="ph-icon" style="font-size:1rem">🎬</span>'
            +'<span style="font-size:.58rem;color:rgba(255,255,255,.5);text-align:center;padding:0 .2rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">'+esc(item.title)+'</span>'
            +(g?'<span style="font-size:.5rem;color:rgba(232,160,32,.55)">'+esc(g)+'</span>':'')
            +'</div>';
        };
        img.onload=()=>{ pd.innerHTML=''; pd.appendChild(img); };
        img.src=bUrl;
      }
    }catch(e){}
    // 5장마다 브라우저에 숨 돌릴 시간 줌 (UI 응답성)
    if(i%5===4) await new Promise(r=>setTimeout(r,0));
  }
}

async function renderCards(filtered){
  _filteredAll=filtered||[];
  _curPage=0;
  cardContainer.innerHTML='';
  statsCount.innerText=`${_filteredAll.length.toLocaleString()}개`;
  if(!_filteredAll.length){
    cardContainer.innerHTML=`<div class="empty-message"><span class="em-icon">🎬</span>${filtered&&filtered.length===0?'검색 결과가 없습니다.':'작품이 없습니다.'}</div>`;
    return;
  }
  await renderPage();
}

async function renderPage(){
  const start=_curPage*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE, _filteredAll.length);
  const pageItems=_filteredAll.slice(start, end);

  // 기존 다음페이지 버튼 제거
  const oldBtn=cardContainer.querySelector('.npb-wrap');
  if(oldBtn) oldBtn.remove();

  // 1단계: 카드 껍데기 즉시 렌더 (동기, 빠름)
  const cards=[];
  const frag=document.createDocumentFragment();
  for(const item of pageItems){
    const card=buildCardShell(item);
    frag.appendChild(card);
    cards.push(card);
  }
  cardContainer.appendChild(frag);

  // 다음 페이지 버튼 표시
  const remaining=_filteredAll.length-end;
  if(remaining>0){
    appendNextPageBtn(_filteredAll.length, end, async()=>{
      _curPage++;
      await renderPage();
      const allCards=cardContainer.querySelectorAll('.movie-card');
      if(allCards[start]) allCards[start].scrollIntoView({behavior:'smooth',block:'start'});
    });
  }

  // 2단계: 이미지 순차 로드 (세마포어 4개 동시 제한, 논블로킹)
  loadImagesForCards(cards, pageItems); // await 없이 호출 → 이미지 로드 중에도 UI 반응
}


function updateGenreChips(){
  const gSet=new Set();
  const base=filterByCat(allItems,curCategory);
  base.forEach(it=>(it.genreList||[]).forEach(g=>{if(g&&g!=='기타')gSet.add(g);}));
  const genres=[...gSet].sort((a,b)=>a.localeCompare(b,'ko'));
  filterChipsDiv.innerHTML='';
  const ac=Object.assign(document.createElement('div'),{className:'chip'+((!curGenre)?' active':''),innerText:'전체'});
  ac.onclick=()=>{curGenre='';render();};filterChipsDiv.appendChild(ac);
  genres.forEach(g=>{
    const ch=Object.assign(document.createElement('div'),{className:'chip'+(curGenre===g?' active':''),innerText:g});
    ch.onclick=()=>{curGenre=(curGenre===g?'':g);render();};filterChipsDiv.appendChild(ch);
  });
}

// 평점 기반 보정: 평점 높을수록 긍정 감정 강화
function ratingBoostTags(rating){
  const r=parseFloat(rating)||0;
  if(r>=8.5) return ['#감동','#힐링'];
  if(r>=7.5) return ['#감동'];
  return [];
}

/**
 * 단일 항목의 감정 태그 자동 분류
 * @returns {string[]} 감정태그 배열 (중복 제거, 최대 5개)
 */
function autoClassifyTags(item){
  const tagScore = {}; // tag → score

  const addTags=(tags,weight=1)=>{
    tags.forEach(t=>{ tagScore[t]=(tagScore[t]||0)+weight; });
  };

  // 1) 장르 기반 (가중치 2)
  (item.genreList||[]).forEach(g=>{
    const ets=GENRE_TO_EMOTION[g]||[];
    addTags(ets, 2);
  });

  // 2) 제목 키워드 (가중치 1.5)
  const titleLower=(item.title||'').toLowerCase();
  TITLE_KEYWORD_MAP.forEach(({words,tags})=>{
    if(words.some(w=>titleLower.includes(w))) addTags(tags, 1.5);
  });

  // 3) genreRaw 원문 키워드 (가중치 1)
  const genreRawLower=(item.genreRaw||'').toLowerCase();
  TITLE_KEYWORD_MAP.forEach(({words,tags})=>{
    if(words.some(w=>genreRawLower.includes(w))) addTags(tags, 1);
  });

  // 4) 평점 보정 (가중치 0.5)
  addTags(ratingBoostTags(item.rating), 0.5);

  // 5) 카테고리별 기본 태그
  if(item.category==='다큐멘터리') addTags(['#생각','#신기'], 1);
  if(item.category==='드라마')     addTags(['#생각'], 0.5);

  // 점수 내림차순 정렬, 상위 4개
  const sorted = Object.entries(tagScore)
    .sort((a,b)=>b[1]-a[1])
    .map(([t])=>t);

  // EMOTION_TAGS 목록에 있는 것만 반환
  const valid = EMOTION_TAGS.map(e=>e.tag);
  return sorted.filter(t=>valid.includes(t)).slice(0,4);
}

/**
 * 전체 DB 항목에 감정 태그 자동 분류 (기존 수동 태그는 보존)
 */
async function autoTagAll(overwrite=false){
  const items = await loadAllItems();
  // 기존 오염 태그 먼저 정리 (EMOTION_TAGS에 없는 것 제거)
  const validTags=new Set(EMOTION_TAGS.map(e=>e.tag));
  for(const item of items){
    const cleaned=(item.hashTags||[]).filter(t=>validTags.has(t));
    if(cleaned.length !== (item.hashTags||[]).length){
      await saveItem({...item, hashTags:cleaned});
    }
  }
  const freshItems = await loadAllItems();
  const needTag = freshItems.filter(i=> overwrite || !(i.hashTags&&i.hashTags.length));
  if(!needTag.length){
    alert('모든 항목에 이미 감정태그가 있습니다.\n덮어쓰기를 원하면 다시 실행 후 "덮어쓰기" 선택');
    return 0;
  }
  // 작품 수 업데이트
  const items2 = await loadAllItems();
  const needTag2 = overwrite ? items2 : items2.filter(i=>!(i.hashTags&&i.hashTags.length));
  let done=0;
  progressPanel.style.display='flex';
  progressFName.innerText='감정태그 자동 분류중…';
  progressFill.style.width='0%';
  for(let i=0;i<needTag2.length;i++){
    const item=needTag2[i];
    const autoTags=autoClassifyTags(item);
    // 기존 수동 태그 + 자동 태그 합치기 (중복 제거)
    const existing=overwrite?[]:(item.hashTags||[]);
    const merged=[...new Set([...existing,...autoTags])];
    await saveItem({...item, hashTags:merged});
    done++;
    progressFill.style.width=((i+1)/needTag2.length*100).toFixed(0)+'%';
    progressStats.innerText=`${done}/${needTag2.length}`;
    progressFName.innerText=item.title;
    if(i%50===0) await new Promise(r=>setTimeout(r,1));
  }
  progressPanel.style.display='none';
  return done;
}

    const pageDesc=[...selTags].join(' ')+' 감정과 어울리는 '+currentTop.length+'편을 선별했습니다.';

    // OG 이미지 메타 (백틱 충돌 방지를 위해 문자열 연결 방식 사용)
    const ogImgMeta=ogImg
      ? '<meta property="og:image" content="'+ogImg+'">\n<meta property="og:image:width" content="300">\n<meta property="og:image:height" content="450">\n<meta name="twitter:image" content="'+ogImg+'">'
      : '';

    const tagBadgesHtml=[...selTags].map(function(t){
      return '<span class="tag-badge">'+t+'</span>';
    }).join('');

    const shareTitleJs=pageTitle.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const shareDescJs=pageDesc.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    const html='<!DOCTYPE html>\n'
      +'<html lang="ko">\n<head>\n'
      +'<meta charset="UTF-8">\n'
      +'<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">\n'
      +'<title>'+pageTitle+'</title>\n'
      +'<meta property="og:type" content="website">\n'
      +'<meta property="og:title" content="'+pageTitle+'">\n'
      +'<meta property="og:description" content="'+pageDesc+'">\n'
      +'<meta name="twitter:card" content="summary_large_image">\n'
      +'<meta name="twitter:title" content="'+pageTitle+'">\n'
      +'<meta name="twitter:description" content="'+pageDesc+'">\n'
      +ogImgMeta+'\n'
      +'<style>\n'
      +'*{box-sizing:border-box;margin:0;padding:0}\n'
      +'body{font-family:\'Apple SD Gothic Neo\',\'Noto Sans KR\',system-ui,sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh;padding:1.5rem 1rem 4rem}\n'
      +'.header{text-align:center;margin-bottom:2rem}\n'
      +'.header h1{font-size:1.3rem;font-weight:800;color:#c4b5fd;margin-bottom:.35rem}\n'
      +'.header p{font-size:.75rem;color:rgba(255,255,255,.35)}\n'
      +'.tag-badges{display:flex;justify-content:center;flex-wrap:wrap;gap:.35rem;margin:.7rem 0}\n'
      +'.tag-badge{background:rgba(139,92,246,.25);border:1px solid rgba(139,92,246,.4);color:#c4b5fd;padding:.2rem .6rem;border-radius:12px;font-size:.75rem;font-weight:700}\n'
      +'.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.7rem;max-width:1200px;margin:0 auto}\n'
      +'@media(max-width:480px){.grid{grid-template-columns:repeat(3,1fr);gap:.5rem}}\n'
      +'.card{background:#131b2c;border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;text-decoration:none;color:inherit;transition:transform .15s,border-color .15s}\n'
      +'.card:hover{transform:translateY(-3px);border-color:rgba(139,92,246,.35)}\n'
      +'.card:active{transform:scale(.97)}\n'
      +'.poster{aspect-ratio:2/3;overflow:hidden;background:#0c1320;display:flex;align-items:center;justify-content:center}\n'
      +'.poster img{width:100%;height:100%;object-fit:cover}\n'
      +'.poster .no-img{font-size:1.8rem;opacity:.2}\n'
      +'.info{padding:.45rem .48rem .38rem;flex:1}\n'
      +'.title{font-size:.75rem;font-weight:700;color:#dde8f8;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.18rem}\n'
      +'.meta{font-size:.64rem;color:rgba(255,255,255,.4);margin-bottom:.18rem}\n'
      +'.rating{color:#fbbf24;font-weight:700}\n'
      +'.tags{display:flex;flex-wrap:wrap;gap:.15rem;margin-top:.18rem}\n'
      +'.tag{font-size:.58rem;background:rgba(139,92,246,.12);color:#a78bfa;border-radius:4px;padding:.03rem .28rem}\n'
      +'.tag.match{background:rgba(139,92,246,.35);color:#ddd6fe;font-weight:700}\n'
      +'.note{font-size:.64rem;color:rgba(255,200,100,.65);margin-top:.28rem;line-height:1.55;font-style:italic}\n'
      +'.share-bar{position:fixed;bottom:0;left:0;right:0;background:#131b2c;border-top:1px solid rgba(255,255,255,.07);padding:.6rem 1rem;display:flex;gap:.5rem;justify-content:center;align-items:center;z-index:100}\n'
      +'.share-btn{background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.35);color:#c4b5fd;padding:.4rem 1.1rem;border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;transition:background .13s}\n'
      +'.share-btn:hover,.share-btn:active{background:rgba(139,92,246,.4)}\n'
      +'.share-btn.copy{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.55)}\n'
      +'.footer{text-align:center;margin-top:1.5rem;margin-bottom:4rem;font-size:.62rem;color:rgba(255,255,255,.18)}\n'
      +'@media print{body{background:#fff;color:#111}.share-bar{display:none}.card{border-color:#ddd}.title{color:#111}.meta{color:#666}}\n'
      +'</style>\n</head>\n<body>\n'
      +'<div class="header">\n'
      +'  <h1>💜 나의 영화 큐레이션</h1>\n'
      +'  <div class="tag-badges">'+tagBadgesHtml+'</div>\n'
      +'  <p>'+pageDesc+'</p>\n'
      +'</div>\n'
      +'<div class="grid">\n'
      +cardHtmlArr.join('\n')
      +'\n</div>\n'
      +'<div class="footer">개인 영화 관람 기록 DB · 큐레이션 생성일: '+dateStr+'</div>\n'
      +'<div class="share-bar">\n'
      +'  <button class="share-btn" id="shareBtn">📤 공유하기</button>\n'
      +'  <button class="share-btn copy" id="copyBtn">🔗 링크 복사</button>\n'
      +'</div>\n'
      +'<script>\n'
      +'(function(){\n'
      +'  var shareBtn=document.getElementById("shareBtn");\n'
      +'  var copyBtn=document.getElementById("copyBtn");\n'
      +'  var title=\''+shareTitleJs+'\';\n'
      +'  var desc=\''+shareDescJs+'\';\n'
      +'  if(navigator.share){\n'
      +'    shareBtn.onclick=function(){\n'
      +'      navigator.share({title:title,text:desc,url:window.location.href}).catch(function(){});\n'
      +'    };\n'
      +'  } else {\n'
      +'    shareBtn.textContent="🔗 URL 복사";\n'
      +'    shareBtn.onclick=function(){\n'
      +'      navigator.clipboard.writeText(window.location.href).then(function(){\n'
      +'        shareBtn.textContent="✅ 복사됨";\n'
      +'        setTimeout(function(){shareBtn.textContent="🔗 URL 복사";},1500);\n'
      +'      });\n'
      +'    };\n'
      +'  }\n'
      +'  copyBtn.onclick=function(){\n'
      +'    var text=title+"\\n\\n"+desc+"\\n\\n"+window.location.href;\n'
      +'    navigator.clipboard.writeText(text).then(function(){\n'
      +'      copyBtn.textContent="✅ 복사됨";\n'
      +'      setTimeout(function(){copyBtn.textContent="🔗 링크 복사";},1500);\n'
      +'    });\n'
      +'  };\n'
      +'})();\n'
      +'<\/script>\n'
      +'</body>\n</html>'
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`영화큐레이션_${[...selTags].join('_')}_${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    showToast(`HTML 큐레이션 파일 저장 완료 — ${currentTop.length}편`, 'success', 4000);
  };

  // SNS 공유 버튼 (모바일 시스템 공유 시트)
  modal.querySelector('#recShareBtn').onclick=()=>{
    if(!currentTop.length){showToast('먼저 태그를 선택하세요','info',2000);return;}
    const tagLabel=[...selTags].join(' ');
    const title=tagLabel+' — 나의 영화 큐레이션';
    const lines=currentTop.slice(0,10).map(i=>{
      const url='https://search.naver.com/search.naver?query='+encodeURIComponent(i.title+' 영화');
      return '• '+i.title+'(★'+i.rating+') '+url;
    });
    const text=title+'\n\n'+lines.join('\n')+(currentTop.length>10?'\n... 외 '+(currentTop.length-10)+'편':'');
    if(navigator.share){
      navigator.share({title,text,url:window.location.href}).catch(()=>{});
    } else {
      navigator.clipboard.writeText(text).then(()=>{
        showToast('큐레이션 목록 (링크 포함) 복사됨','success',3000);
      }).catch(()=>showToast('복사 실패. HTML 내보내기를 이용하세요','error',3000));
    }
  };
}

function openStatsModal(){
  const modal=document.createElement('div');modal.className='modal';
  modal.innerHTML=`<div class="modal-box stat-modal-box">
    <button class="modal-close">&times;</button>
    <h3>📊 통계 대시보드</h3>
    <div class="stat-tabs">
      <button class="stat-tab active" data-tab="country">국가별</button>
      <button class="stat-tab" data-tab="genre">장르별</button>
      <button class="stat-tab" data-tab="year">연도별</button>
      <button class="stat-tab" data-tab="category">카테고리</button>
      <button class="stat-tab" data-tab="hashtag">감정태그</button>
    </div>
    <div class="stat-chart-area" id="statChart"></div>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('.modal-close').onclick=()=>modal.remove();
  const renderStat=tab=>{
    modal.querySelectorAll('.stat-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
    const chart=modal.querySelector('#statChart');chart.innerHTML='';
    let data={},colors={country:'#e8a020',genre:'#3b82f6',year:'#10b981',category:'#8b5cf6',hashtag:'#a78bfa'};
    if(tab==='country')rawItems.forEach(i=>{const k=i.country||'미분류';data[k]=(data[k]||0)+1;});
    else if(tab==='genre')rawItems.forEach(i=>(i.genreList||[]).forEach(g=>{data[g]=(data[g]||0)+1;}));
    else if(tab==='year')rawItems.forEach(i=>{const k=i.year||'연도없음';data[k]=(data[k]||0)+1;});
    else if(tab==='category')rawItems.forEach(i=>{const k=i.category||'기타';data[k]=(data[k]||0)+1;});
    else if(tab==='hashtag')rawItems.forEach(i=>(i.hashTags||[]).forEach(t=>{data[t]=(data[t]||0)+1;}));
    const sorted=Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,20);
    const max=sorted[0]?.[1]||1;
    if(!sorted.length){chart.innerHTML='<p style="color:rgba(255,255,255,.25);font-size:.75rem">데이터 없음</p>';return;}
    sorted.forEach(([label,count])=>{
      const row=document.createElement('div');row.className='bar-row';
      row.innerHTML=`<div class="bar-label" title="${esc(label)}">${esc(label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/max*100).toFixed(1)}%;background:${colors[tab]||'#e8a020'}"></div></div>
        <div class="bar-count">${count}</div>`;
      chart.appendChild(row);
    });
  };
  renderStat('country');
  modal.querySelectorAll('.stat-tab').forEach(t=>t.onclick=()=>renderStat(t.dataset.tab));
}

async function exportToExcel(){
  const items=allItems.filter(i=>{
    if(!filterByCat([i],curCategory).length)return false;
    if(curGenre&&!(i.genreList||[]).includes(curGenre))return false;
    if(searchKw.trim()){if(!matchSearch(i.title,searchKw))return false;}
    return true;
  });
  const rows=[['NO','제목','평점','국가','개봉연도','카테고리','장르','러닝타임','감정태그','OST링크','인문학노트']];
  items.forEach(i=>rows.push([i.excelNo||'',i.title,i.rating,i.country,i.year,i.category,i.genreRaw,i.runtime,(i.hashTags||[]).join(','),i.ostLink||'',i.humNote||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`movieDB_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

async function fullBackup(){
  const items=await loadAllItems();
  if(!items.length){alert('데이터가 없습니다.');return;}
  const favRows=await idbAll(ST_FAVS);
  loadFavCatsLocal();
  const data={items:items.map(({id,...r})=>r),favs:favRows.map(({id,...r})=>r),favCats,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`movieDB_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
  alert(`✅ 백업 완료 — ${items.length.toLocaleString()}개\n즐겨찾기 ${favRows.length}개 포함`);
}

async function fullRestore(file){
  if(!confirm('기존 데이터가 삭제되고 복원됩니다. 계속?'))return;
  const text=await file.text();
  const data=JSON.parse(text);
  const imported=Array.isArray(data)?data:(data.items||[]);
  const favs=data.favs||[];
  const cats=data.favCats||['전체'];
  const old=await loadAllItems();
  for(const o of old)await idbDel(ST_ITEMS,o.id).catch(()=>{});
  const oldFavs=await idbAll(ST_FAVS);
  for(const f of oldFavs)await idbDel(ST_FAVS,f.id).catch(()=>{});
  for(const item of imported){
    item.genreList=parseGenres(item.genreRaw||'기타');
    item.link=item.link||`https://search.naver.com/search.naver?query=${encodeURIComponent(item.title)}`;
    item.hashTags=item.hashTags||[];
    delete item.id;
    await saveItem(item);
  }
  for(const fav of favs){delete fav.id;await idbAddFav2(fav);}
  favCats=['전체',...new Set(cats.filter(c=>c!=='전체'))];
  saveFavCatsLocal();
  clearImgCache();
  await refreshData();
  alert(`✅ 복원 완료 — ${imported.length.toLocaleString()}개`);
}

// DB 내 작품과 OST DB 매칭
function findOstForItem(item){
  const t=(item.title||'').toLowerCase().replace(/\s/g,'');
  return FAMOUS_OST_DB.find(o=>{
    const ot=o.title.toLowerCase().replace(/\s/g,'');
    return t===ot || t.includes(ot) || ot.includes(t);
  });
}


function openOstModal(){
  const modal=document.createElement('div');modal.className='modal';
  const matched=[];
  const unmatched=[];
  FAMOUS_OST_DB.forEach(o=>{
    const inDB=rawItems.some(item=>{
      const t=(item.title||'').toLowerCase().replace(/\s/g,'');
      const ot=o.title.toLowerCase().replace(/\s/g,'');
      return t===ot||t.includes(ot)||ot.includes(t);

    else unmatched.push({...o,inDB:false});

  modal.innerHTML=`<div class="modal-box" style="max-width:820px">

      <span style="color:#34d399">● 초록</span>은 내 DB 수록 작품입니다.
    </p>

      <button class="stat-tab" data-ostf="inDB" style="font-size:.68rem">내 DB 수록 (${matched.length})</button>
      <button class="stat-tab" data-ostf="notInDB" style="font-size:.68rem">미수록 (${unmatched.length})</button>

      row.style.cssText=`display:flex;align-items:flex-start;gap:.65rem;padding:.5rem .65rem;border-radius:9px;border:1px solid ${o.inDB?'rgba(52,211,153,.15)':'rgba(255,255,255,.05)'};background:${o.inDB?'rgba(52,211,153,.04)':'rgba(255,255,255,.02)'};transition:background .12s`;

        <div style="font-size:.65rem;color:rgba(255,255,255,.3);margin-top:.2rem">${esc(o.ost)}</div>

      // 버튼 영역

      const searchBtn2=document.createElement('button');
      searchBtn2.style.cssText='background:#e8a020;border:none;color:#111;padding:.3rem .7rem;border-radius:8px;cursor:pointer;font-size:.68rem;font-weight:700;white-space:nowrap';
      searchBtn2.textContent='🔍 YouTube 검색';
      searchBtn2.onclick=e=>{e.stopPropagation();window.open(searchUrl,'_blank');};

      if(o.inDB){
        const goBtn=document.createElement('button');
        goBtn.style.cssText='background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.25);color:#6ee7b7;padding:.28rem .7rem;border-radius:8px;cursor:pointer;font-size:.64rem;font-weight:600;white-space:nowrap';
        goBtn.textContent='📌 카드 이동';
        goBtn.onclick=e=>{
          e.stopPropagation();
          const found=rawItems.find(item=>{
            const t=(item.title||'').toLowerCase().replace(/\s/g,'');
            const ot=o.title.toLowerCase().replace(/\s/g,'');
            return t===ot||t.includes(ot)||ot.includes(t);

      b.classList.add('active');
      renderOstList(b.dataset.ostf);
    };
  });
}

function setupSubDropdowns(){
  // 서브필터 active 표시 — 서브칩 선택 시만 활성화, 버튼 클릭(전체) 시 초기화
  const setActive=(dropId,sub)=>{
    document.querySelectorAll('#'+dropId+' .sub-chip').forEach(c=>{
      c.classList.toggle('active', sub!=='' && c.dataset.sub===sub);
    });
  };

  // ── 드라마 ──
  const dramaBtn=document.getElementById('dramaBtn');
  const dramaDD=document.getElementById('dramaDropdown');
  dramaBtn.onclick=e=>{
    e.stopPropagation();
    curCategory='drama'; curSubFilter=''; curGenre=''; searchKw=''; searchInput.value='';
    setActive('dramaDropdown',''); // 서브필터 해제
    navBtns.forEach(b=>b.classList.remove('active')); dramaBtn.classList.add('active');
    dramaDD.classList.toggle('open');
    document.getElementById('docuDropdown').classList.remove('open');
    document.getElementById('movieDropdown').classList.remove('open');
    render();
  };
  dramaDD.querySelectorAll('.sub-chip').forEach(c=>{
    c.onclick=e=>{
      e.stopPropagation();
      curSubFilter=c.dataset.sub;
      setActive('dramaDropdown',curSubFilter);
      dramaDD.classList.remove('open');
      curCategory='drama'; curGenre=''; searchKw=''; searchInput.value='';
      navBtns.forEach(b=>b.classList.remove('active')); dramaBtn.classList.add('active');
      render();
    };
  });

  // ── 다큐 ──
  const docuBtn=document.getElementById('docuBtn');
  const docuDD=document.getElementById('docuDropdown');
  docuBtn.onclick=e=>{
    e.stopPropagation();
    curCategory='documentary'; curSubFilter=''; curGenre=''; searchKw=''; searchInput.value='';
    setActive('docuDropdown','');
    navBtns.forEach(b=>b.classList.remove('active')); docuBtn.classList.add('active');
    docuDD.classList.toggle('open');
    dramaDD.classList.remove('open');
    document.getElementById('movieDropdown').classList.remove('open');
    render();
  };
  docuDD.querySelectorAll('.sub-chip').forEach(c=>{
    c.onclick=e=>{
      e.stopPropagation();
      curSubFilter=c.dataset.sub;
      setActive('docuDropdown',curSubFilter);
      docuDD.classList.remove('open');
      curCategory='documentary'; curGenre=''; searchKw=''; searchInput.value='';
      navBtns.forEach(b=>b.classList.remove('active')); docuBtn.classList.add('active');
      render();
    };
  });

  // ── 영화 ──
  const movieBtn=document.getElementById('movieBtn');
  const movieDD=document.getElementById('movieDropdown');
  movieBtn.onclick=e=>{
    e.stopPropagation();
    curCategory='movie'; curSubFilter=''; curGenre=''; searchKw=''; searchInput.value='';
    setActive('movieDropdown','');
    navBtns.forEach(b=>b.classList.remove('active')); movieBtn.classList.add('active');
    movieDD.classList.toggle('open');
    dramaDD.classList.remove('open');
    document.getElementById('docuDropdown').classList.remove('open');
    render();
  };
  movieDD.querySelectorAll('.sub-chip').forEach(c=>{
    c.onclick=e=>{
      e.stopPropagation();
      curSubFilter=c.dataset.sub;
      setActive('movieDropdown',curSubFilter);
      movieDD.classList.remove('open');
      curCategory='movie'; curGenre=''; searchKw=''; searchInput.value='';
      navBtns.forEach(b=>b.classList.remove('active')); movieBtn.classList.add('active');
      render();
    };
  });

  document.addEventListener('click',()=>{
    movieDD.classList.remove('open');
    dramaDD.classList.remove('open');
    docuDD.classList.remove('open');
  });
}

    await refreshData();
  }catch(err){alert('엑셀 오류: '+err.message);}};
  reader.readAsArrayBuffer(file);e.target.value='';
});

    return '• '+i.title+' (★'+i.rating+') '+naverUrl;
  });
  if(favItems.length>15) lines.push('... 외 '+(favItems.length-15)+'편');
  const text=title+'\n\n'+lines.join('\n');

  if(navigator.share){
    navigator.share({
      title,
      text:favItems.slice(0,5).map(i=>'• '+i.title+'(★'+i.rating+')').join(', ')+'  외 '+favItems.length+'편',
      url:window.location.href
    }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      showToast('즐겨찾기 목록 (링크 포함) 클립보드 복사됨','success',3000);
    }).catch(()=>showToast('복사 실패','error',2000));
  }
};

// ══════════════════════════════════════════════════════════════
// 초기화 — GitHub 자동 로드 + 태그 자동분류
// ══════════════════════════════════════════════════════════════
(async()=>{
  await initDB();
  loadFavCatsLocal();
  setupSubDropdowns();
  await refreshData();

  // 1) 데이터 없으면 GitHub에서 자동 로드 (태그 분류 포함)
  if(rawItems.length===0){
    debug('데이터 없음 — GitHub 자동 로드');
    await loadExcelFromGithub(false);
  } else {
    // 2) 기존 데이터 있지만 태그 없는 항목이 있으면 조용히 자동 분류
    const noTagCount=rawItems.filter(i=>!(i.hashTags&&i.hashTags.length)).length;
    if(noTagCount>0){
      debug(`태그 없는 작품 ${noTagCount}개 — 자동 분류 시작`);
      showToast(`🤖 감정태그 자동 분류 중… (${noTagCount}개)`, 'info', 3000);
      await autoTagAll(false);
      await refreshData();
    }
  }

  debug('영화/드라마 DB v27 준비 완료');
})();
</script>
