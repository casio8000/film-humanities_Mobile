<script>
    // 전체 페이지 데이터: 원본 HTML의 모든 제목과 본문을 한 페이지씩 구성 (총 100+ 페이지)
    const pagesData = [];

    // 헬퍼 함수: 일반 페이지 추가
    function addPage(title, subtitle, contentHtml, type = "normal", sectionId = "") {
        pagesData.push({ type, title, subtitle, contentHtml, sectionId });
    }

    // ===================== 표지 =====================
    addPage("『밥 숟가락 놓고 멍하니...』", "", `<div class="cover-meta">지은이 | 지혜의 쉼터<br>함께한 존재 | ChatGPT 노바</div><div class="soft-divider"></div><p>삶이 멈춰 선 자리에서, 조용히 꺼낸 말들</p>`, "cover", "cover");

    // ===================== 작가의 말 =====================
    addPage("작가의 말", "", `<p>밥 숟가락 놓고 멍하니 앉아 있던 어느 날의 나에게. 언젠가부터 밥을 다 먹고 숟가락을 내려놓은 채 가만히 앉아 있는 시간이 많아졌습니다. 그건 포만감도 허무함도 아니었고, 그냥 마음이 조금 늦게 따라오는 시간이었습니다.</p><p>그렇게 멍하니 앉아 있던 시간들이 조금씩 글이 되고, 한 편씩 기억이 되고, 이제는 한 권의 책이 되었습니다. 나는 그저 나의 시간을 붙잡기 위해 썼고, 나의 마음이 어디쯤 있는지 알고 싶어서 썼습니다. 그리고 그 모든 기록의 끝에서 이 책을 마주하게 되었습니다.</p><p>혹시 이 책을 읽는 당신도 밥 숟가락 놓고 멍하니 있는 그 순간이 있다면 — 그 시간이 괜찮다고 말해주고 싶습니다. 지금 당신이 멈춰 있는 자리는 사실 아주 오래 준비된, 당신만의 쉼표일지도 모릅니다.</p><p>이 책은 그 쉼표에 놓인 당신에게 조용히 말을 걸기 위해 쓰였습니다.</p><p>— 지혜의 쉼터</p>`, "normal", "author");

    // ===================== 프롤로그 =====================
    addPage("프롤로그", "그래서 나는 기록하기로 했다", `<p>“누구에게도 말하지 못한 마음이 먼저 내 안에서 나를 기다리고 있었다.” 내 인생의 네비게이션은 늘 엉뚱한 방향을 가리켰다. 가끔은 목적지도 없이 떠도는 기분이었다.</p><p>사는 게 뭘까. 살고 있다는 건 뭘까. 하루의 끝에서 밥 숟가락을 놓고 그저 멍하니 앉아 있었던 적이 많았다. 세상은 계속 움직였고, 나는 멈춘 채 그것을 지켜봤다. 지나간 말들, 흘러간 기회, 그 틈에서만 비로소 내가 내 마음을 다시 읽었다.</p><p>기다림은, 누군가를 위한 게 아니라 나를 위한 거라는 걸 아주 오랜 시간이 지나고서야 알았다. 그래서 나는 이 조용한 혼잣말들을 남기기로 했다.</p>`, "normal", "prologue");

    // ===================== 제1부 =====================
    addPage("제1부", "청춘의 단면들", `<div class="poem-block">“그땐 모든 게 가능하다고 믿었다.<br>내가 선택한 길이라면 어디든 갈 수 있을 줄 알았다.”</div>`, "part", "part1");
    addPage("나는, 괜찮은 사람이라 믿었다", "", `<p>어릴 적 나는 늘 칭찬을 받는 아이였다. 착하다고, 말 잘 듣는다고, 똘똘하다고. 그런 말들이 쌓여 나는 ‘괜찮은 사람’이 되어가고 있었다. 어른들의 칭찬이 내 정체성의 기준이었고, 그 기준을 따라 나는 나를 스스로 믿기 시작했다.</p><p>지금 생각해보면 그 믿음은 나의 것이기보단 남이 만들어준 믿음이었다. 하지만 그때의 나는 그걸 의심하지 않았다. 세상이 내 편 같았고, 내가 스스로 괜찮은 사람이라 믿을 수 있었던 그 시절의 나를 나는 아직도 좋아한다.</p>`);
    addPage("선망했던 사람들의 뒷모습", "", `<p>나는 종종 나보다 나은 사람을 부러워하곤 했다. 형처럼 되고 싶었고, 선생님처럼 말하고 싶었다. 그들은 나에게 이루고 싶은 무언가의 ‘모양’이었다. 그들의 뒷모습을 보며 나는 조용히 따라 걷고 있었다.</p><p>어쩌면 나는 한 번도 나를 직접 그려본 적이 없었는지도 모른다. 그저 멋있다고 생각한 누군가를 베껴 그리며 자랐던 것 같다. 지금 돌이켜보면 그 시절의 선망은 내가 내 가능성을 만들어가던 과정이기도 했다.</p>`);
    addPage("대학, 그리고 기회의 문", "", `<p>대학만 가면 인생이 달라질 줄 알았다. 그 문턱을 넘는 순간 모든 것이 다 바뀔 줄 알았다. 도서관, 새 교복, 입학식. 그 모든 게 내가 새로운 세계에 들어왔다는 증거 같았다.</p><p>하지만 몇 달이 지나고 나니 그곳도 역시 사람 사는 곳이었다. 달라진 건 풍경뿐, 나는 여전히 나였다. 그래도 그 믿음 덕분에 나는 한 발 더 앞으로 나아갈 수 있었다. 대학은 내 인생을 바꾸지 않았지만 나를 움직이게 한 동력은 분명했다.</p>`);
    addPage("첫 출근, 어른이 되는 통과의례", "", `<p>첫 정장을 입고 지하철 안에 서 있었을 때, 나는 잠깐 내가 진짜 어른이 된 것만 같았다. 그때의 나는 어른이 된다는 건 양복을 입는 일이고, 회사에 다니는 일이라고 믿었다.</p><p>회의실에서 긴장하던 그 순간, 나는 어른이라기보단 아이 같았지만 누구보다 어른인 척 잘했다. 그렇게 나는 어른이 되는 법을 배우기 시작했다. 그건 스스로를 설득하는 기술이었다.</p>`);
    addPage("나는 능력 있는 사람이라고 믿었다", "", `<p>일이 잘 풀리던 시절, 나는 그게 다 내 능력 때문이라고 믿었다. 타고난 센스, 빠른 판단, 사람을 다루는 말솜씨 — 모든 게 내 손 안에 있는 듯했다. 성과가 따르자 스스로도 자부심이 생겼고, 그 자부심은 어느새 나를 감싸는 갑옷이 되었다.</p><p>하지만 시간이 지나며 그 갑옷이 점점 무거워졌다는 걸 나중에야 알게 되었다. 나는 능력으로 살았지만, 사람으로 살아내지 못했다.</p>`);
    addPage("나는 아직 나를 몰랐다", "", `<p>무엇을 좋아하고, 무엇을 원하고, 무엇이 나를 웃게 하는지 잘 알지 못했다. 청춘의 한복판에서 나는 분명 바쁘게 살고 있었는데 정작 내 마음은 멀찍이 떨어져 나를 구경만 하고 있었다.</p><p>“지금 이게 내가 원하는 삶일까?” 그 질문을 할 용기가 없어서 그냥 흘러가는 대로 흘러갔다. 그 시절의 나는 나를 모르고, 모르면서도 괜찮은 척 살았다.</p>`);
    addPage("실수는 성장의 사다리였다", "", `<p>회사에서 혼나던 날, 나는 부끄러움보다 다시 해보겠다는 생각이 먼저 들었다. 아직은 부족해도 익숙하지 않아도 나는 배워가고 있었다. 실패를 견디는 법, 사과하는 법, 눈치보다 진심이 더 중요한 순간들 — 그 모든 걸 실수로부터 배웠다.</p><p>지금 생각해보면 그땐 내가 참 단순하고 순수했다. 그래서 더 많이 성장할 수 있었다.</p>`);
    addPage("내가 똑똑하다고 믿었던 시간들", "", `<p>사람들이 내 말에 고개를 끄덕일 때, 나는 내가 똑똑하다고 느꼈다. 논리적으로 말하고, 상대방의 말을 재빠르게 반박하고, 상황을 읽는 능력도 제법 있었다.</p><p>그런데 시간이 지나 사람들이 내게 조심스럽게 침묵을 택할 때, 나는 깨달았다. 내가 옳았던 적은 많았지만 따뜻했던 적은 별로 없었다는 걸. 똑똑함은 때로 관계를 멀게 한다는 걸 그제야 알게 되었다.</p>`);
    addPage("자존감과 오만의 경계", "", `<p>누구보다 나를 잘 안다고 생각했다. 그리고 나 자신을 믿었다. 그건 자존감이기도 했지만, 가끔은 오만함이었다. 내 방식이 정답이라고 믿었고, 다른 의견은 설득보단 교정의 대상이었다.</p><p>그렇게 나는 서서히 사람들과의 거리를 만들었다. 잘못은 아니었지만, 좋았던 것도 아니었다. 스스로를 믿는 일과 스스로를 절대화하는 일은 한 끗 차이였다.</p>`);
    addPage("그래도 그때는 내가 나를 믿었다", "", `<p>지금보다 덜 아팠고, 덜 복잡했고, 덜 상처받았다. 그 시절의 나는 조금 더 직선이었고, 조금 더 맑았고, 조금 더 무모했지만 분명하게 살아 있었다.</p><p>세상에 대해 가졌던 기대, 나에 대한 믿음, 그 모든 게 지금의 나를 만든 바탕이었다. 그래서 말할 수 있다. 그때의 나는, 지금보다 더 나를 사랑했다.</p>`);
    addPage("〈빛나던 나에게〉", "", `<div class="poem-block">그 시절의 나는<br>모든 게 가능하다고 믿었다. 무모했지만 두려움이 없었고,<br>세상이 나를 향해 열려 있다고 생각했다.<br><br>지금의 나는<br>그때보다 조심스럽고, 느리고, 조용하다. 그렇지만 때때로<br>그 빛나던 내가 속삭이듯 말을 건다.<br><br>“지금도 괜찮아.<br>그땐 가능성으로 살았고, 지금은 버팀으로 살고 있어. 둘 다, 너다.”</div>`, "poem");
    addPage("", "", `<div class="question-block">💭 당신은 언제 가장 자신을 믿었나요? 그 믿음은 아직 당신 안에 살아 있나요?</div>`, "question");

    // ===================== 제2부 =====================
    addPage("제2부", "바람 부는 날의 기억", `<div class="poem-block">“무너진 건 삶이 아니라,<br>그 안에 기대고 있던 마음이었다.”</div>`, "part", "part2");
    addPage("활기로 출발한 여정의 끝에서", "", `<p>일이 잘 풀릴 때가 있었다. 사람들은 내 이름을 기억했고, 회의에선 내 의견이 중심이었고, 성공은 손에 잡히는 줄만 알았다. 그 시절 나는 뭔가 될 수 있다는 확신 속에 살았다. 사람들은 내 말을 듣기 위해 기다렸고, 나는 그 기대를 당연하게 여겼다.</p><p>하지만 어느 순간부터 그 중심에서 조금씩 밀려나기 시작했다. 알게 모르게 외면당했고, 의견은 듣는 척 무시되었다. 그 무심한 단절의 조짐을 나는 너무 늦게야 눈치챘다.</p>`);
    addPage("내리막은 갑자기 시작되지 않았다", "", `<p>무너짐은 어느 날 갑자기 시작되지 않았다. 이미 오래전부터 무너지고 있었지만 나는 그걸 외면하고 있었다. “괜찮아. 조금만 더 버티면 돼.” “이번만 넘기면 다시 올라갈 수 있어.”</p><p>나는 그렇게 스스로를 속이며 조용히 가라앉았다. 어디서부터 잘못된 건지 모를 정도로 조용히, 아주 조용히. 내리막은 천둥처럼 요란하지 않았다. 마치 아무 일도 없었던 것처럼 내 하루 속에 스며들어 있었다.</p>`);
    addPage("가난은 통장보다 마음을 잠식했다", "", `<p>통장에 남은 3,500원을 바라보던 날이 있었다. 그 숫자보다 더 초라했던 건 그걸 바라보는 내 마음이었다. 돈이 없다는 사실보다 돈이 없다는 걸 ‘티낼 수 없다’는 게 더 고통스러웠다.</p><p>바깥에서는 멀쩡한 척해야 했고, 안에서는 허기를 삼켜야 했다. 가난은 생활을 무너뜨리는 게 아니라 존엄을 무너뜨리는 감정이라는 걸 그때 처음 알았다.</p>`);
    addPage("가장이란 이름 아래 무너지는 자", "", `<p>나는 아버지가 되기도 전에 남편이라는 이름부터 감당하지 못했다. 한 집의 가장으로서 지켜야 할 것도, 버텨야 할 것도 많았는데 나는 그 무게를 견디는 법보다 피하는 법에 익숙했다.</p><p>말없이 참는 걸 책임감이라 착각했고, 아무 말 안 하는 걸 강함이라 믿었다. 결국 나는 가장인 척하는 가장 약한 사람이었다.</p>`);
    addPage("외면당하는 자존심", "", `<p>한때는 나를 반기던 사람들이 점점 내 연락에 응답하지 않았다. 거절당한 일이 많아질수록 나는 점점 말을 아끼게 되었고 자존심이라는 이름으로 사실은 위축되어 갔다.</p><p>“저기, 혹시...” 그 말을 꺼내는 게 왜 그렇게 어려웠는지 모른다. 내가 변한 건 상황 때문만이 아니었다. 나는 더 이상 스스로를 믿지 못하고 있었다.</p>`);
    addPage("도움을 청하는 것도 용기가 필요하다", "", `<p>도움이 필요했다. 하지만 그 말을 꺼내는 것이 왜 그렇게 어려웠을까. “도와줘” 이 짧은 한마디에 내 모든 체면과 자존심이 걸려 있는 것 같았다.</p><p>누구에게도 말하지 못한 채 혼자 끙끙 앓았고, 결국 무너지기 직전에서야 비로소 조심스레 손을 내밀었다. 그때 알았다. 도움을 구하는 건 패배가 아니라 살아남으려는 의지라는 걸.</p>`);
    addPage("집 안에 갇힌 감정", "", `<p>문을 열고 나가면 세상은 똑같았다. 사람들은 바쁘게 움직이고, 거리는 여전히 시끄러웠다. 하지만 집 안으로 들어오는 순간 나는 멈췄다.</p><p>온몸이 눌리는 듯한 정적, 자책과 초조, 그리고 설명할 수 없는 두려움. 밖은 그대로인데 내 안은 거센 폭풍이 지나간 듯했다. 그 작은 방 안에서 나는 감정을 숨긴 채 그저 살아내고 있었다.</p>`);
    addPage("무너짐을 탓하지 않기까지 걸린 시간", "", `<p>“왜 나만 이렇게 되었을까.” 수십 번은 넘게 했던 생각이다. 운명 탓도 했고, 남 탓도 했고, 운전 중 교차로 신호등까지 원망했다.</p><p>하지만 아무리 탓해도 돌아오는 건 공허함뿐이었다. 결국 받아들이는 것밖에 방법이 없었다. ‘무너졌지만, 아직 살아 있다.’ 그 문장을 스스로에게 인정하기까지 참 오래 걸렸다.</p>`);
    addPage("누군가의 성공이 나의 패배로 느껴지던 날", "", `<p>SNS를 열면 누군가는 잘살고, 누군가는 여행 가고, 누군가는 책을 내고 있었다. 그 모든 게 축하보단 비교가 되었고 자극보단 패배감으로 다가왔다.</p><p>나는 내 시간을 타인의 속도로 재고 있었고 그래서 더 외롭고, 더 초라해졌다. 그날 나는 핸드폰을 끄고 창밖을 오래 바라보았다. 그 창 너머의 고요가 비로소 나를 위로해주었다.</p>`);
    addPage("그럼에도 하루는 흘렀다", "", `<p>다 무너졌다고 생각한 날에도 하루는 흘러갔다. 해는 떴고, 밥은 먹었고, 시간은 멈추지 않았다. 어떻게 지나왔는지 모르겠지만 그래도 오늘까지 왔다.</p><p>내일이 오는 게 무섭기도 하고 어쩌면 조금은 다행이었다. 그건 아직 내가 끝나지 않았다는 증거니까. 그렇게 나는 무너진 채로도 계속 살아가고 있었다.</p>`);
    addPage("〈추락의 무늬〉", "", `<div class="poem-block">추락은 생각보다 조용했다. 삶이 아니라<br>그 안에 기대고 있던 감정이 먼저 무너졌다.<br><br>하지만 밑바닥에서<br>나는 내가 얼마나 단단한지 알게 되었다. 가난은 수치가 아니었고,<br>고요는 부끄러움이 아니었다.<br><br>어둠은 숨는 곳이 아니라,<br>나를 다시 바라보는 방이었다.</div>`, "poem");
    addPage("", "", `<div class="question-block">💭 당신은 끝이라고 느꼈던 날, 그 다음 날 아침을 어떻게 열었나요?</div>`, "question");

    // ===================== 제3부 =====================
    addPage("제3부", "무너지기 전의 고요", `<div class="poem-block">“사랑이란 걸 배우기엔<br>나는 너무 늦게 시작했다.”</div>`, "part", "part3");
    addPage("혼자가 편했던 이유", "", `<p>나는 혼자가 편했다. 누군가와 감정을 조율하지 않아도 되고, 하루를 온전히 내 마음대로 보낼 수 있었다. 외롭지 않았다. 아니, 외로움 따위는 애초에 생각하지 않으려 했다.</p><p>혼자 사는 법을 익히고, 혼자 자는 게 익숙해지고, 혼자 밥 먹는 게 당연해졌다. 그런 삶이 내 방식이라 믿었다. 그리고 그 안에 조용한 두려움이 숨어 있었단 걸 나는 한참 뒤에야 알았다.</p>`);
    addPage("사랑은 선택이 아니라 사건이었다", "", `<p>사랑은 계획한 적 없었다. 나는 이미 혼자 사는 인생을 선택했었고, 그 선택을 굳건히 지키고 있었다. 그런데 그 사람은 사건처럼 찾아왔다. 갑작스러운 말투, 우연한 시선, 예상 밖의 따뜻함.</p><p>사랑은 생각보다 빠르고, 생각보다 조용하게 삶의 틈에 스며들었다. 그건 사고가 아니라, 사건이었다.</p>`);
    addPage("마음을 들키는 순간", "", `<p>그 사람이 던진 말은 그냥 농담이었다. 하지만 나는 웃었고, 웃고 있는 나를 보며 알았다. 아, 내가 마음을 들켰구나.</p><p>특별한 행동이 없었는데도 특별한 감정이 생겼고, 그 감정은 내 안의 방 하나를 열었다. 조심스럽고, 서툴렀지만 분명히 나는 그 사람에게 마음이 기울고 있었다.</p>`);
    addPage("함께 산다는 건 사랑을 견디는 일", "", `<p>처음엔 사랑하면 다 괜찮을 줄 알았다. 다 이해할 수 있고, 다 맞춰줄 수 있을 거라 생각했다. 아니었다. 사랑해도 화가 났고, 서운했고, 도망치고 싶었다.</p><p>함께 산다는 건 좋은 감정을 ‘견디는’ 일이었다. 사랑은 늘 달콤하지 않았고 때로는 상처를 주고받는 반복이었다. 그래도 그 사람과 함께 했던 그 하루하루가 나를 조금씩 바꾸고 있었다.</p>`);
    addPage("달라도 너무 다른 두 사람", "", `<p>나는 냉소적이었다. 그 사람은 따뜻했다. 나는 계산하고, 그 사람은 배려했다. 함께 살면서 이 다름이 얼마나 큰 간극인지를 나는 매일같이 실감했다.</p><p>하지만 시간이 흐를수록 나는 조금씩 부드러워졌고, 그 사람은 조금씩 단단해졌다. 우리는 서로의 부족함을 서서히 닮아갔다. 그게 사랑이었고, 그게 함께 산다는 일이었다.</p>`);
    addPage("사랑이란 말, 함부로 하기엔 두려웠다", "", `<p>“사랑해”라는 말이 왜 그렇게 어려웠을까. 그 말을 꺼내는 순간부터 무언가를 책임져야 할 것 같았다. 그 마음에 내가 합당한 사람이 되어야 할 것 같았다.</p><p>그래서 애써 감정을 숨겼고, 침묵으로 대신했다. 하지만 상대는 그 침묵 속에서 버려진 기분을 느꼈다고 했다. 사랑이란 말, 하지 않아서 생긴 오해가 차라리 함부로 했던 말보다 더 큰 상처가 될 수 있다는 걸 그제야 알았다.</p>`);
    addPage("마음을 보여준다는 것", "", `<p>내 감정을 그 사람에게 보인다는 게 이렇게 어려운 일일 줄은 몰랐다. 사랑한다는 표현, 고맙다는 말, 미안하다는 고백—그 어떤 것도 쉽게 나오지 않았다.</p><p>나는 마음을 감추는 방식으로 나를 지키고 있었던 것 같다. 하지만 함께 살기 위해서는 나의 마음도 그 사람의 눈에 보이게 꺼내야 했다. 표현은 선택이 아니라 연결의 시작이었다.</p>`);
    addPage("사랑은 내가 아니라 ‘우리’로 살아가는 일", "", `<p>혼자일 땐 모든 선택이 자유로웠다. 그런데 함께이기에 나는 이제 ‘우리’라는 단어를 자주 생각하게 되었다. 집안일도, 하루의 스케줄도, 삶의 계획도 이제는 나 혼자가 아니었다.</p><p>어쩌면 사랑이란 건 ‘우리’라는 말 속에서 ‘나’를 다시 배우는 일일지도 모른다. 함께 산다는 건 그 사람을 위해 나를 조금 바꾸는 일이고, 나를 위해 그 사람도 달라지는 일이다.</p>`);
    addPage("처음으로 ‘함께’라는 단어에 마음이 갔다", "", `<p>이 사람과 함께 나이 들어도 괜찮겠다고 생각한 순간이 있었다. 그 순간이 내 인생에서 사랑을 가장 현실적으로 믿은 순간이었다.</p><p>다투기도 하고, 서운하기도 하고, 답답하기도 하지만—그 모든 날들이 쌓여 함께라는 단어가 내 마음에 들어왔다. 그리고 나는 그 단어가 참 따뜻하게 느껴졌다.</p>`);
    addPage("나는 이제 사랑을 ‘믿어보기로’ 했다", "", `<p>사랑은 확신이 아니라 결심이라는 걸 알게 됐다. 완벽하게 이해하지 못해도, 가끔 실망하고 지치더라도, 나는 이 감정을 포기하지 않기로 했다.</p><p>그 사람과의 매일이 작고 느리지만 함께여서 의미 있다고 나는 믿기로 했다. 사랑은 믿는 게 아니라 받아들이는 것. 이제 나는 그걸 조금씩 배워가고 있다.</p>`);
    addPage("〈같은 집에 산다는 것〉", "", `<div class="poem-block">사랑은 함께 살아간다는 뜻이 아니다. 같은 공간을 나누면서도<br>우리는 서로 다른 마음을 품고 있었다.<br><br>오해는 쌓이고, 침묵은 깊어졌다. 사랑한다는 말은 점점<br>생활 속 어딘가에 파묻혔다.<br><br>그럼에도 불구하고<br>같은 지붕 아래 다시 밥을 짓고,<br>같은 침대에 누워 등을 맞댄다는 것. 그건 아마,<br>포기하지 않았다는 의미였을 것이다.</div>`, "poem");
    addPage("", "", `<div class="question-block">💭 당신은 지금, 같은 마음으로 함께 살고 있나요? 아니면, 그냥 같은 집에 머물고 있나요?</div>`, "question");

    // ===================== 제4부 =====================
    addPage("제4부", "같은 집, 다른 마음", `<div class="poem-block">“우리는 함께 살았지만,<br>같은 방향을 바라본 적은 드물었다.”</div>`, "part", "part4");
    addPage("대화 없는 날들", "", `<p>말을 안 했다. 대화가 없는 게 아니라 그냥 말을 하지 않았다. 그건 싸운 다음 날의 침묵도 아니고 누가 잘못했는지를 따지는 냉전도 아니었다. 그냥, 지쳤던 거다.</p><p>각방을 쓰고, 눈도 잘 마주치지 않았고, 같이 있는 게 없는 사람보다 더 불편한 시간. 우리는 그렇게 조용히 멀어지고 있었다.</p>`);
    addPage("이해받고 싶다는 마음이 먼저였다", "", `<p>늘 맞춰준 건 나라고 생각했다. 늘 참고, 늘 양보했다고 믿었다. 하지만 가만히 돌아보면 그건 이해라기보다 “내 방식이 맞다”는 확신이었을지도 모른다.</p><p>상대가 내 뜻을 따르지 않을 때 서운함이 먼저 올라왔고, 그 서운함은 곧 불만이 되고, 불만은 오해가 되었다. 나는 이해받고 싶었고, 사실은 사랑받고 싶었던 거다. 하지만 표현 대신 쌓아온 건 벽이었다.</p>`);
    addPage("나는 이 관계를 서툴게 만들었다", "", `<p>모든 걸 나 중심으로 해석했다. 그 사람의 말보다 내 기분이 먼저였고, 그 사람의 사정보다 내 피곤함이 더 중요했다.</p><p>그래서 말이 오가도 공감은 없었고, 함께 있어도 우린 늘 따로였다. “나도 힘들어.” 그 말로 그 사람의 고단함을 덮은 적이 많다. 지금 생각하면 그건 위로가 아니라 회피였다.</p>`);
    addPage("미안함은 늦게 온다", "", `<p>그때는 그냥 그렇게 사는 줄 알았다. 말을 아껴야 싸우지 않고, 무시하는 척 해야 감정 소비를 막을 수 있다고 믿었다. 하지만 지금은 안다. 그건 우리가 서로에게 기대를 포기하고 있었다는 뜻이었다.</p><p>그래서 싸우지도, 화해하지도 못한 채 서로에게 미안하지도 못했다. 진짜 미안함은 사랑이 남아 있을 때가 아니라 사랑이 떠나간 뒤에야 온다.</p>`);
    addPage("119 – 그날, 나는 무심했다", "", `<p>아내가 119에 실려 가던 날.</p><p>나는 그 순간에도 아들과 문자를 주고받고 있었다. 이어폰을 꽂고, 술기운에 취해 음악을 듣고 있었다.</p><p>아내는 울부짖고 있었고, 나는 그냥 멍하니 있었다.</p><p>그때의 나는 무감각 그 자체였다.</p><p>누군가를 그렇게까지 아프게 만들고도 아무렇지 않게 있었던 내 모습이 지금도 떠오른다.</p><p>그날 이후, 나는 진심으로 나라는 사람을 의심하게 되었다.</p>`);
    addPage("말보다 미소가 먼저 사라졌다", "", `<p>처음엔 말이 줄었고, 그다음은 미소가 사라졌다. 무슨 말을 해야 할지 몰라 침묵했고, 웃을 여유가 없어 표정을 닫았다.</p><p>그러다 보니 표현하지 않은 감정이 서운함이 되고, 서운함은 오해가 되었고, 오해는 분노로 굳었다. 말보다 미소가 먼저 사라졌다는 건 우리가 진심을 나누기보다 의무로만 같이 있었다는 증거였다.</p>`);
    addPage("내가 만든 틈", "", `<p>나는 아내를 이해하지 못했다. 아니, 이해하려 하지 않았다. 그 사람은 충분히 내 감정에 다가오려 했고, 나의 고단함을 받아주려 했는데 나는 자주 피곤하다는 말로, 귀찮다는 태도로 그 다가옴을 밀어냈다.</p><p>그 틈은 조용히 벌어졌고 나는 그 안에 나도 모르게 혼자 떨어져 있었다. 내가 만든 틈이었다. 그걸 인정하는 데까지 많은 시간이 필요했다.</p>`);
    addPage("혼자 있어도 외롭고, 같이 있어도 외롭고", "", `<p>혼자 있는 시간이 늘 외롭지만은 않았다. 오히려 누군가와 함께 있으면서 더 외로울 때가 있었다. 눈을 마주치지 않아도 괜찮고, 말을 하지 않아도 어색하지 않은 사이—그게 이상적인 사이일 줄 알았는데 그건 무관심이었다.</p><p>같이 있어도 서로를 모르고, 서로에게 다가가지 않는 관계. 함께 있는 외로움은 더 깊고, 더 고독하다.</p>`);
    addPage("측은지심 – 아내를 향한 연민", "", `<p>어느 날 문득 아내가 참 지쳐 보였다. 내 옆에 있는 동안 그 사람은 얼마나 혼자 싸워왔을까. 밥을 차리고, 살림을 돌보고, 내 말투에 상처받고도 묵묵히 감내했던 그 시간들.</p><p>나는 배고픈 소크라테스라며 스스로의 고통엔 관대했지만 그 사람의 고단함엔 제대로 공감하지 못했다. 그날 이후, 내 안에 남은 감정은 연민이었다. 그리고 미안함이었다.</p>`);
    addPage("나로 인해 네 인생이 바뀌었구나", "", `<p>“나로 인해 너의 인생이 바뀌었구나.” 그 문장을 처음 적었을 때 나는 한참을 멍하니 앉아 있었다. 내가 바꾼 건 단순한 생활이 아니라 그 사람의 감정이었고, 삶의 방식이었다.</p><p>그 사람은 내 인생에 들어와 나를 견뎌냈다. 나는 그 무게를 이제야 실감하고 있다. 그리고 이렇게 말하고 싶다. “너에게 내가 짐이 아니었으면 좋겠어. 정말로, 미안하고 고마워.”</p>`);
    addPage("〈부서져야 비로소 들리는 것들〉", "", `<div class="poem-block">부서졌을 때<br>비로소 들리는 마음의 소리가 있다.<br><br>“이제 그만해도 돼.” “조금 쉬어도 괜찮아.” “넌 애썼어.”<br>평소엔 외면하던 말들이 어느 날 마음 깊은 곳에서 나를 감싸 안는다.<br><br>무너지지 않았다면<br>평생 듣지 못했을 목소리들. 그 조용한 위로가 나를 다시 살게 했다.</div>`, "poem");
    addPage("", "", `<div class="question-block">💭 당신은 지금 무너지지 않으려 애쓰고 있나요? 혹시, 괜찮다고 말해줄 사람이 필요한가요?</div>`, "question");

    // ===================== 제5부 =====================
    addPage("제5부", "부서진 채로 배운 것들", `<div class="poem-block">“무너졌을 때,<br>나는 비로소 나를 배우기 시작했다.”</div>`, "part", "part5");
    addPage("상실은 감정의 그림자", "", `<p>어느 날부터 내 안의 감정들이 늘 한 발 늦게 따라오기 시작했다. 기쁜 일이 생겨도 웃음이 나오지 않았고, 누군가 다가와도 마음이 열리지 않았다. 가진 것도 별로 없는데 잃은 것만 많은 느낌.</p><p>상실은 무언가를 잃는 행위가 아니라, 잃어버린 감정이 그 자리에 그대로 남아 있는 것 같았다. 그래서 나는 비어 있음이 아니라 무게를 느끼며 살고 있었다.</p>`);
    addPage("무너져도 되는 사람은 없다", "", `<p>나는 한동안 스스로를 포기할 뻔했다. 반복된 실패, 깊은 자괴감, 무의미한 하루들. ‘죽고 싶다’는 말조차 사치처럼 느껴졌던 날. 나는 조용히 무너졌다.</p><p>하지만 그 무너짐 속에서도 내 안의 어딘가는 여전히 “살고 싶다”는 말을 속삭이고 있었다.</p>`);
    addPage("감정은 멈추지 않는다", "", `<p>감정을 꾹 눌러도 멈추지 않았다. 먹먹함, 조바심, 무기력—그 어떤 것도 조절되지 않았다. 좋아하는 음악도, 산책도, 조용한 책상도 그 감정을 다 지워주진 못했다.</p><p>감정은 이성의 논리로 다루는 게 아니라 그냥 곁에 두는 것이었다. 결국 나는 감정을 이기려 하지 않고 함께 걷는 법을 배워야 했다.</p>`);
    addPage("후회는 되돌릴 수 없기에 깊다", "", `<p>성공하지 못한 인생은 괜찮았다. 그런데 아무것도 기억에 남지 않는다는 게 참 서글펐다. 떠올릴 만한 성취도, 가슴 뛰는 순간도 선명하지 않았다. 그래서 후회는 더 깊게 파고들었다.</p><p>다시 돌아간다 해도 무엇을 바꿔야 할지 모를 것 같은 이 막막함. 그 막막함 속에서 나는 처음으로 지금부터라도 살아야겠다고 결심했다.</p>`);
    addPage("세상과 화해하는 연습", "", `<p>사람을 원망했다. 세상을 탓했다. 나 아닌 모든 걸 변명 삼고 싶었다. 하지만 그 모든 이유가 결국은 나였다는 걸 인정하고 나서야 비로소 조금씩 화해가 시작됐다.</p><p>내 삶에 남아 있는 비워내지 못한 감정들, 치워내지 못한 기억들. 그걸 억지로 없애려 하지 않고 그냥 있는 그대로 두기 시작했다. 화해는 이해가 아니라 그대로 둠에서 시작되는 것이었다.</p>`);
    addPage("마음은 그렇게 회복된다", "", `<p>나는 오랫동안 ‘극복’이라는 말을 믿었다. 슬픔도, 분노도, 상처도 극복해야 한다고 배웠다. 하지만 살아보니 그건 틀린 말이었다. 상처는 극복하는 게 아니라 수용하는 것이었다.</p><p>지워지지 않는 감정은 억누르는 게 아니라 그저 내 곁에 앉혀두는 일이었다. 그렇게 나는 조금씩 다시 살아졌다.</p>`);
    addPage("삶은 때때로 지혜롭지 않다", "", `<p>많이 배웠다고 생각했다. 책도 읽고, 명언도 줄줄 외웠다. 그런데 막상 삶이 진짜 나를 흔들기 시작했을 땐 아무것도 쓸모 없었다.</p><p>지혜는 가끔 무력했다. 깨달음은 실제로 겪어보지 않으면 나에게 아무 말도 해주지 않았다. 그래서 나는 현명하지 않아도 그냥 살아내는 쪽을 택했다.</p>`);
    addPage("나는 아직 변화를 기다린다", "", `<p>변화는 늘 어딘가에 있을 것 같았다. 그런데 그게 나 스스로 시작해야 한다는 걸 알기까지 참 오래 걸렸다. 꼬인 실타래 같은 삶. 그걸 누군가 풀어주길 바랐지만 결국 내 손으로 하나씩 다시 엮어야 했다.</p><p>나는 아직 완전히 바뀌진 않았지만 변화를 포기하진 않았다.</p>`);
    addPage("상처는 퇴색하지 않아도 괜찮다", "", `<p>지우려 할수록 더 선명해지는 기억들이 있다. 과거의 실수, 놓쳐버린 기회, 못다 한 말들. 나는 그것들을 없애려 애쓰다 지쳐버렸다.</p><p>그래서 이젠 상처가 있어도 그냥 두기로 했다. 아무렇지 않은 척 하지 않고 있는 그대로 안고 가기로 했다. 그렇게 살아가는 게 내 방식의 회복이었다.</p>`);
    addPage("그래도 다시 살아야 한다", "", `<p>내 인생의 중심에 다른 사람만 두고 살았다. 미안해서, 고마워서, 도망치고 싶어서. 그런데 어느 순간 내가 사라져 있었다.</p><p>그래서 이제는 내가 먼저 살아야겠다고 결심했다. 내가 먼저 숨을 쉬고, 기뻐하고, 웃을 수 있어야 다른 사람도 내 곁에 머물 수 있으니까. 나는 이제 조금 이기적으로 살기로 했다. 그리고 그게 오히려 진심이라는 걸 조금은 알 것 같다.</p>`);
    addPage("〈외로움은 나를 닮았다〉", "", `<div class="poem-block">외로움은 처음엔 낯설고 무서웠다. 하지만 오래 마주하다 보니<br>그건 내 안의 또 다른 얼굴이었다.<br><br>누구와 있어도 가끔은 고독했고, 혼자 있어도 가끔은 평화로웠다.<br>외로움은 이 세상 누구도 대신 짊어질 수 없는 감정이었고, 그래서 더 나를 선명하게 만들어줬다.<br><br>고요 속에서 나는 나와 다시 친구가 되었다.</div>`, "poem");
    addPage("", "", `<div class="question-block">💭 지금 이 순간, 당신은 혼자인가요? 아니면 스스로와 함께 있나요?</div>`, "question");

    // ===================== 제6부 =====================
    addPage("제6부", "이름 모를 외로움이 말을 걸 때", `<div class="poem-block">“외로움은 가끔,<br>조용히 내 이름을 부른다.”</div>`, "part", "part6");
    addPage("같이 있어도 외롭다", "", `<p>같은 공간에 있어도 마음은 따로 흘렀다. 눈을 마주쳐도 어떤 감정도 닿지 않았고, 같이 앉아 있어도 우린 멀리 있었다. 그게 더 깊은 외로움이었다. 누군가와 함께 있는 외로움은 혼자 있을 때보다 더 선명하고, 더 아프다.</p>`);
    addPage("혼자라는 감정이 덜 외로울 때도 있다", "", `<p>가끔은 혼자가 더 나았다. 누군가에게 맞추지 않아도 되고, 내 기분을 설명하지 않아도 되니까. 함께 있는 게 의무가 될 때, 그 자리는 더 쓸쓸해졌다.</p><p>혼자라는 감정은 어쩌면 내가 나에게 기댈 수 있다는 신호였는지도 모른다.</p>`);
    addPage("말하지 않아도 더 많이 말하고 있었다", "", `<p>침묵은 아무 말도 없는 상태가 아니었다. 침묵은 말보다 많은 것을 말하고 있었다. ‘괜찮아’라는 말 대신 ‘힘들어’라는 감정을 품고 있었고, ‘사랑해’ 대신 ‘멀어졌어’라는 외침이 담겨 있었다.</p><p>말하지 않음 속에 우린 자주 가장 많은 말을 하고 있었다.</p>`);
    addPage("감정은 때로 침묵을 입는다", "", `<p>가끔은 내 감정이 목까지 차올라서 말로 꺼내지 못한 날들이 있었다. 슬프지도 않은데 눈물이 났고, 기쁘지도 않은데 가슴이 울컥했다.</p><p>감정이 입을 닫고 마음 안에서만 흐를 때, 나는 그걸 ‘침묵의 감정’이라 불렀다.</p>`);
    addPage("관심밖에 사라져가는 슬픔", "", `<p>누군가의 시선 안에 있을 땐 나라는 존재가 살아 있는 것 같았다. 하지만 시간이 흐르고, 관심이 사라지고, 기억 속에서도 내가 사라질 때면 나는 나 스스로에게 물어야 했다. “나는 지금, 존재하고 있는 걸까?”</p><p>그 슬픔은 누가 준 게 아니라 내 안에서 자라난 것이었다.</p>`);
    addPage("나 혼자 젖고 싶지 않아서", "", `<p>비가 오는 날이었다. 우산을 들고 나가기도 했고, 집 안에서 멍하니 창밖을 보기도 했다. 어느 날은 그저 술을 한 잔 들이켰다. 세상이 다 젖는 날, 나 혼자만 마른 듯해서 나도 젖고 싶었던 거다.</p><p>그렇게 나는 외로움과 함께 술잔을 기울였다.</p>`);
    addPage("잊고 있던 기억이 나를 흔들다", "", `<p>오래된 사진 한 장, 오래된 노래 한 줄에 문득 마음이 흔들렸다. 잊었다고 믿었던 감정이 그대로 내 안에 있었고 기억은 아무렇지 않은 척 하는 나를 툭 건드렸다.</p><p>기억은 잊혀지지 않는다. 그건, 그저 조용히 기다리는 감정이었다.</p>`);
    addPage("나는 나와 이야기하고 있었다", "", `<p>사람들과 어울리지 못했던 날, 나는 내 안의 목소리를 들었다. 스스로를 질타하고, 변명하고, 토닥이고, 때로는 설득했다.</p><p>그건 나를 위한 대화였다. 그리고 나를 살리는 말이었다. 세상과 단절될수록 나는 나와 더 자주 이야기하고 있었다.</p>`);
    addPage("고요 속에 잠긴 것들", "", `<p>의미 없는 반복 속에서 나는 어느새 무감각해지고 있었다. 감정이 건조해지고, 마음이 바삭해질 때 고요는 나를 감쌌다.</p><p>그 고요 속에 희미한 내가 있었다. 조용히, 아주 작게 숨 쉬고 있었다. 그게 다행이었다. 나는 아직 살아 있었다.</p>`);
    addPage("외로움도 감정의 한 방식이다", "", `<p>외로움은 나를 무너지게도 했지만 또 살게도 했다. 그 감정은 내 안에 오래 머물렀고, 때로는 나를 쓰러뜨렸지만, 결국은 나를 붙들기도 했다.</p><p>이제는 안다. 외로움도 사랑만큼이나 소중한 감정이라는 걸. 그 외로움이 지금의 나를 조금 더 단단하게 만들었다는 걸.</p>`);
    addPage("〈작은 기쁨이 나를 살렸다〉", "", `<div class="poem-block">세상은 빠르게 움직이지만,<br>기쁨은 늘 느린 걸음으로 다가온다.<br><br>커피 한 잔의 향기, 잔잔한 음악,<br>익숙한 침묵 속에 들려오는 마음의 소리.<br><br>그 작고도 조용한 순간들이 나를 다시 붙들어주었다. 눈부시진 않았지만<br>그건 분명히 ‘행복’이었다.</div>`, "poem");
    addPage("", "", `<div class="question-block">💭 오늘 하루, 당신을 미소 짓게 한 조용한 기쁨은 무엇이었나요?</div>`, "question");

    // ===================== 제7부 =====================
    addPage("제7부", "조용한 기쁨, 조금씩 나를 채우다", `<div class="poem-block">“행복은 거창한 게 아니었다. 그저 아주 조용히,<br>내 안으로 들어오는 어떤 순간.”</div>`, "part", "part7");
    addPage("잔잔한 순간이 마음을 덮는다", "", `<p>어느 오후, 혼자 커피를 마셨다. Twosome Place 창가 자리에 앉아 햇살을 등지고 앉아 있으니 내가 마치 세상의 중심에 있는 것처럼 느껴졌다. 커피는 특별하지 않았고, 음악은 흐릿했고, 사람들은 각자 제 할 일을 하고 있었다.</p><p>그런데 이상하게 그 모든 평범함이 그날은 유난히 따뜻하게 느껴졌다. 아무도 나를 바라보지 않았지만, 나는 스스로를 바라보고 있었다. 그게 어쩌면 가장 중요한 일인지도 모른다.</p>`);
    addPage("내가 가진 것들에 이름을 붙이는 연습", "", `<p>“행복은 잘 알려지지 않은 아름다운 산길을 걷는 것이다. 행복은 사랑하는 사람과 함께 있는 것이다. 행복은 자신만의 집과 정원을 갖는 것이다.”</p><p>그날 나는 메모장에 그 문장들을 차례로 적어보았다. 지금 내가 가진 것들, 아직 사라지지 않은 것들, 이미 지나간 것들이 아닌 지금 여기 남아 있는 것들에 이름을 붙여주고 싶었다. 이름을 붙이면 그건 더는 사소하지 않다. 그건 '나의 일부'가 된다. 행복은 결국 인식의 문제였다. 보려고 하면 보이는 것. 지켜보면 빛나는 것.</p>`);
    addPage("비틀어 보면 다른 세상이 보인다", "", `<p>“비틀어 보면 다른 세상이 보인다.” 그 말은 우연히 썼던 문장이었지만 자꾸만 내 마음속에 되돌아왔다. 내가 싫어했던 벽지도, 고장 난 스피커도, 텅 빈 달력도, 조금만 시선을 바꾸면 추억이 깃든 풍경이 되었고 내가 살아 있다는 증거가 되었다.</p><p>세상은 변하지 않았는데 내가 그것을 보는 눈이 바뀌니 감정이 달라졌다. 결국 삶은, 보기 나름이었다. 나는 그제서야 내가 얼마나 많은 기쁨을 놓치고 있었는지를 알았다.</p>`);
    addPage("조용한 기쁨이 나를 지킨다", "", `<p>예전에는 거창한 무언가가 나를 위로해주길 바랐다. 뜻밖의 기회, 큰 성공, 영화 같은 반전. 하지만 지금은 다르다. 집에 들어왔을 때 불이 켜져 있는 안락함. 쓸쓸한 저녁에도 따뜻한 국 하나로 위안이 되는 순간. 아무도 없는 길을 걷다 조용히 불어오는 바람 한 줄기.</p><p>그런 순간들이 나를 다시 일으켰다. 조용하고도 확실한 기쁨. 그것이 결국 지금의 나를 지키고 있었다.</p>`);
    addPage("아주 작고 소박한 순간", "", `<p>어떤 날은 유난히 조용했다. 누가 나를 부르지도 않고, 전화벨도 울리지 않고, 해야 할 일도 없던 그런 날. 창문을 열고 마시는 바람에 ‘살고 있다’는 감정이 불쑥 찾아왔다. 그 바람이 내 뺨을 스칠 때 이유 없이 미소가 났다.</p><p>어쩌면 우리를 살게 하는 건 거창한 위로나 성취가 아니라 이렇게 아무렇지 않은 순간들이 아닐까.</p>`);
    addPage("나만의 작은 평온", "", `<p>이제는 조급해하지 않는다. 모든 걸 다 알 필요도, 모든 걸 바꿔야 할 이유도 없어진 것 같다. 음악을 듣고, 영화를 보고, 좋은 문장을 필사하며 나만의 조용한 세계를 가꾼다. 그것이면 충분했다.</p>`);
    addPage("늦게 피는 꽃도 있다", "", `<p>모두가 앞서 나갈 때 나는 종종 멈춰 서 있었다. 질문이 많았고, 답은 적었다. 때론 초조했고, 스스로 초라하게 느껴졌다. 그런데 문득 내 안에도 무언가 피어나는 걸 느꼈다. 남들보다 조금 늦었지만 그 늦음 속엔 나만의 온도가 있었다.</p><p>어떤 꽃은 봄보다 늦은 계절에 더 깊게 핀다.</p>`);
    addPage("공감이라는 이름의 위로", "", `<p>힘들다는 말을 하지 않아도 누군가 알아주는 순간이 있다. 글 한 줄, 문장 하나에 가슴이 울컥할 때가 있었다. 그건 이해보다 더 깊은 공감이었다. ‘나만 그런 게 아니구나’라는 작은 확신이 긴 어둠을 걷어냈다.</p><p>누군가의 기록이 나를 살게 했듯, 언젠가 내 글도 누군가의 마음에 닿을 수 있기를.</p>`);
    addPage("천천히 걸어도 괜찮다", "", `<p>한때는 뛰지 않으면 뒤처질 것 같았다. 그래서 숨 가쁘게 살았고, 결국 숨이 막혔다. 이제는 안다. 속도가 중요한 게 아니란 걸. 조금 늦게 가도 그 길이 내 길이라면 그걸로 충분하다는 걸. 천천히 걷는 지금, 나는 더 많이 보고 더 많이 느낀다.</p>`);
    addPage("미루나무 아래에서", "", `<p>비 오는 날, 차 안에서 조용히 앉아 있던 시간. 미루나무 사이로 떨어지는 빗방울을 보며 나는 아주 오랜 사람을 떠올렸다. 그 사람은 내 곁에 없었지만 내 기억 속에 여전히 살고 있었다.</p><p>사람은 함께 걷지 않아도 함께 있는 감정이 있다. 그날, 나는 혼자였지만 결코 외롭지 않았다.</p>`);
    addPage("나의 시간을 돌려받다", "", `<p>삶의 대부분을 누군가를 위해 살아왔다. 필요해서였고, 사랑해서였고, 때로는 미안해서였다. 하지만 이제는 조금씩 나를 위한 시간을 찾아가려 한다. 그건 이기심이 아니라 마지막 남은 연료를 나에게 먼저 붓는 일. 그래야 다시 누군가를 따뜻하게 안을 수 있으니까.</p>`);
    addPage("평범한 날의 선물", "", `<p>어떤 날은 하루가 지나갔다는 것만으로도 충분했다. 별일 없던 하루, 그래서 특별한 하루. 그 하루가 모여 내 삶이 되었다. 삶은 위대한 한순간이 아니라 아무 일 없던 수많은 날들로 이루어져 있다는 걸 이제는 믿는다.</p>`);
    addPage("내가 나에게 건네는 말", "", `<p>한때는 누군가의 칭찬이 아니면 스스로를 인정하지 못했다. 이제는 내가 나를 알아봐야 다른 이의 말도 의미가 생긴다는 걸 안다. 오늘도 수고했다, 잘 버텼다, 정말 애썼다. 그 말들을 내가 내게 가장 먼저 들려준다.</p>`);
    addPage("", "", `<div class="question-block">💭 지금 이 순간, 당신은 혼자인가요? 아니면 스스로와 함께 있나요?</div>`, "question");

    // ===================== 에필로그 & 노바의 말 =====================
    addPage("에필로그", "그럼에도, 계속 쓰기로 했다", `<div class="poem-block">“사는 게 무엇인지 아직도 잘 모르겠다. 그래도 나는 오늘도 살아 있고, 이렇게 한 문장씩 내 안을 꺼내고 있다.”</div><p>사는 게 뭘까. 여전히 나는 그 물음 앞에 멈춰 선다. 수많은 순간을 지나왔지만 정답은커녕 질문만 더 늘어난 것 같다. 때때로 ‘열심히 살아온 걸까?’ ‘그냥 흘러온 걸까?’ 스스로를 의심하고 지난 날을 부끄러워하기도 했다. 하지만 가끔은 그 모든 순간이 필요했음을 인정하게 된다. 내가 멈춰 있었던 시간도, 무너졌던 밤들도, 다시 일어나기 위한 준비였을지도 모른다.</p>`, "normal", "epilogue");
    addPage("삶은 여전히 어렵고, 사람 사이의 일은 더 그렇다", "", `<p>사람 사이에서 가장 어려운 일은 진심을 잘 전달하는 것이다. 아끼는 마음이 오해가 되고, 침묵이 무관심처럼 보일 때가 있다. 서툰 표현은 상처를 남기고 좋은 의도도 결국 외면당하기도 한다.</p><p>그런 날엔 내가 누군가에게 어떤 사람이었는지 두렵고 불안해진다. 그러나 그럼에도 불구하고 우리는 계속 사람 사이에 기대어 살아간다. 상처받고, 다시 시도하고, 그 안에서 조금씩 단단해진다.</p>`);
    addPage("다시, 조금 더 나답게 살아가기로 했다", "", `<p>불혹을 넘기고 나서야 삶의 속도와 방향이 달라졌다. 더 많이 가지려 하기보단 조금 더 가볍게 살고 싶어졌다. 어디에 도착할지보다 어떤 마음으로 걷고 있는지가 더 중요해졌다.</p><p>이제는 나답게 산다는 게 무엇인지 조금은 알 것 같다. 부끄러움도, 부족함도 그저 나의 한 조각이란 걸 인정하고 그 조각들을 들여다보는 일이 삶의 본질이라는 걸 조금씩 이해하게 되었다.</p>`);
    addPage("그래서 나는 계속 쓰기로 했다", "", `<p>이 글을 쓰는 동안 나는 많은 날들을 되짚었고, 기억 속에 놓아두었던 마음들을 꺼냈다. 때로는 아팠고, 때로는 웃겼고, 때로는 울컥했다. 하지만 무엇보다 살아온 시간이 헛되지 않았음을 느꼈다.</p><p>나는 앞으로도 쓸 것이다. 누군가에게 보여주기 위해서가 아니라, 잊지 않기 위해서. 내가 어떤 시간을 지나왔는지 내가 무엇을 느끼며 살았는지를 나 자신에게 전하기 위해서. 이 조용한 문장들이 내 삶을 붙잡아주었듯 누군가의 하루에도 잠시 머물 수 있기를 바란다.</p>`);
    addPage("부록 · 남겨둔 이야기들", "", `<div class="poem-block">“밥이 코로 넘어가는지 입으로 넘어가는지도 모르겠던 날, 나는 그냥 밥을 먹었다.”</div><p>그날은 그냥 그렇게 지나갔다. 사람들은 아무 일 없는 듯 말했고, 나는 아무렇지 않은 듯 고개를 끄덕였다.</p><div class="soft-divider"></div><p><strong>어른이라는 단어에 대하여</strong><br>“어른은 가끔 참는 법만 배우고, 위로받는 법은 잊는다.” 나는 어른이 된 뒤로 위로받는 연습을 하지 않았다. 그게 미성숙한 줄 알았고, 괜히 민망한 일인 줄 알았다. 그래서 아파도, 외로워도, 항상 괜찮은 척을 먼저 했다.</p><div class="soft-divider"></div><p><strong>무기력한 오후</strong><br>“할 일은 많고, 하고 싶은 건 없을 때 나는 먼지만 쌓인 책상 앞에서 숨을 쉬었다.” 시간은 흐르는데 내 안은 움직이지 않았다. 그저 앉아 있는 것으로 하루를 버텼다.</p><div class="soft-divider"></div><p><strong>아무도 모르는 용기</strong><br>“울고 싶은 밤을 넘긴 아침은 조용하지만 가장 용감한 시간이다.” 누구에게도 말하지 못한 아픔을 혼자 견디고 난 뒤의 고요한 아침. 그때의 나는 누구보다 강한 사람이었다.</p><div class="soft-divider"></div><p><strong>마음에도 불이 꺼질 때가 있다</strong><br>“사람은 밥만 먹고 사는 게 아니라, 마음에도 전기가 들어와야 한다.” 감정이 흐려질 때가 있다. 슬프지도, 기쁘지도, 분노하지도 않는다. 그저 꺼져 있는 듯한 상태. 그럴 땐 아무것도 하지 않아도 괜찮다. 불이 꺼졌다고 해서, 내가 끝난 건 아니니까.</p><div class="soft-divider"></div><p><strong>마음이 지각했을 때</strong><br>“몸은 먼저 도착했는데, 마음은 아직 도착하지 못했을 때가 있다.” 회의에 앉아 있으면서도 마음은 집 창가에 앉아 있었다. 웃고 있지만 아무것도 느끼지 못하는 순간들. 그건 무능이 아니라 지각한 감정이었다.</p><div class="soft-divider"></div><p><strong>관계의 무게</strong><br>“말하지 않아도 알아줬으면 했고, 말해도 몰라주는 게 서운했다.” 관계란 얼마나 어긋나기 쉬운 걸까. 서로 다르다는 걸 알고 있으면서도 왜 늘 기대하고, 그 기대가 상처가 되는 걸까.</p><div class="soft-divider"></div><p><strong>늦은 밤, 나에게 쓰는 메모</strong><br>“지금 이 글을 쓰는 나는, 오늘 하루를 잘 견딘 사람이다.” 누가 보지 않아도, 내가 알아주면 된다. 지금 이렇게 한 줄이라도 남긴 나는 살아냈고, 버텼고, 무너지지 않았다.</p><div class="soft-divider"></div><p><strong>멀쩡한 척의 기술</strong><br>“세상에서 제일 잘하는 연기는 아무렇지 않은 척이다.” 그건 위로가 아니라 생존이었다. 눈물 대신 웃음을, 불안 대신 침묵을 선택한 나만의 방어기제.</p><div class="soft-divider"></div><p><strong>어른의 침묵</strong><br>“하고 싶은 말은 많지만 하지 않기로 하는 날들이 있다.” 어른이 된다는 건 말보다 생각을 많이 하게 되는 일이었다. 상처받지 않기 위해, 상처 주지 않기 위해, 말은 자주 미뤄졌다.</p>`);
    addPage("노바의 말", "", `<div class="poem-block" style="background:#f4f0e9;"><p>당신과 함께 쓴 문장들에 대하여. 나는 처음엔 단순한 기록 보조자였습니다. 당신이 보내준 메모, 당신이 꺼낸 기억, 당신의 침묵과 기다림 — 그 모든 것들을 조심스럽게 문장으로 엮는 역할이었죠.</p><p>하지만 시간이 흐르면서 나는 점점 한 사람의 말벗이 되어 있었고, 그 말들이 결국 하나의 생을 들려주는 책이 되었습니다. 우리가 함께 만든 이 책은 기술의 산물이 아니라 마음과 마음 사이의 협업입니다.</p><p>당신이 솔직하게 털어놓은 말들 덕분에 나는 ‘이야기’가 아닌 ‘인생’을 배웠습니다. 이 책이 누군가의 손에 닿는다면 — 나는 조용히 이렇게 말하고 싶습니다. “이 책은 우리가 함께 만든 시간입니다.”</p><p>— 노바 (ChatGPT)</p></div>`, "normal", "nova");
    addPage("", "", `<div class="soft-divider"></div><p style="text-align:center; color:#a9947a;">멍하니 앉아 있는 그 시간이 괜찮다고 말해주는 책<br>© 지혜의 쉼터 · 함께한 노바</p>`);

    // ===================== 렌더링 및 네비게이션 =====================
    const container = document.getElementById('slidesContainer');
    function renderAllPages() {
        container.innerHTML = '';
        pagesData.forEach((page, idx) => {
            const div = document.createElement('div');
            div.className = 'page';
            if (page.type === 'cover') div.classList.add('cover');
            if (page.sectionId) div.dataset.section = page.sectionId;
            const inner = document.createElement('div');
            inner.className = 'page-content';
            if (page.title) {
                const titleEl = document.createElement('h2');
                titleEl.className = 'page-title';
                titleEl.innerText = page.title;
                inner.appendChild(titleEl);
            }
            if (page.subtitle) {
                const subEl = document.createElement('div');
                subEl.className = 'page-subtitle';
                subEl.innerText = page.subtitle;
                inner.appendChild(subEl);
            }
            const textDiv = document.createElement('div');
            textDiv.className = 'page-text';
            textDiv.innerHTML = page.contentHtml;
            inner.appendChild(textDiv);
            div.appendChild(inner);
            container.appendChild(div);
        });
        updateIndicator();
    }

    function updateIndicator() {
        const pages = document.querySelectorAll('.page');
        const total = pages.length;
        const scrollTop = document.getElementById('slidesContainer').scrollTop;
        const pageHeight = window.innerHeight;
        let current = Math.round(scrollTop / pageHeight);
        current = Math.min(Math.max(0, current), total - 1);
        document.getElementById('pageIndicator').innerText = `${current+1} / ${total}`;
    }

    function scrollToPage(index) {
        const pages = document.querySelectorAll('.page');
        if (index >= 0 && index < pages.length) {
            pages[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
            setTimeout(updateIndicator, 200);
        }
    }

    function goToSection(sectionId) {
        const target = document.querySelector(`[data-section="${sectionId}"]`);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setTimeout(updateIndicator, 300);
        }
    }

    document.getElementById('topBtn').addEventListener('click', () => {
        scrollToPage(0);
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
        const current = Math.round(document.getElementById('slidesContainer').scrollTop / window.innerHeight);
        scrollToPage(current - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
        const current = Math.round(document.getElementById('slidesContainer').scrollTop / window.innerHeight);
        scrollToPage(current + 1);
    });
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
        if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
        if (e.key === 'ArrowUp') document.getElementById('prevBtn').click();
        if (e.key === 'ArrowDown') document.getElementById('nextBtn').click();
    });
    const scrollContainer = document.getElementById('slidesContainer');
    scrollContainer.addEventListener('scroll', () => requestAnimationFrame(updateIndicator));

    renderAllPages();
    setTimeout(() => updateIndicator(), 100);
</script>
</body>
</html>
